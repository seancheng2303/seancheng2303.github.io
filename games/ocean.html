<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>深海大暴走 - 暴走河豚除錯版</title>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #0b1a2a;
            color: white;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background: linear-gradient(to bottom, #1a3c5a, #0b1a2a);
            border: 3px solid #4a90e2;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.5);
            display: block;
            margin: 10px auto;
        }
        #ui-panel {
            width: 800px;
            margin: 10px auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            background-color: #2c3e50;
            color: white;
            border: 2px solid #4a90e2;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:hover { background-color: #34495e; transform: scale(1.05); }
        .btn:disabled { background-color: #555; border-color: #777; cursor: not-allowed; transform: none; }
        #oxygen-display { font-size: 24px; font-weight: bold; color: #00ffff; }
        #level-display { font-size: 20px; font-weight: bold; color: #f1c40f; }
    </style>
</head>
