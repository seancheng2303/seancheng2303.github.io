<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>深海大暴走 - 十關挑戰版</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #0b1a2a;
            color: white;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background: linear-gradient(to bottom, #1a3c5a, #0b1a2a);
            border: 3px solid #4a90e2;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.5);
            display: block;
            margin: 10px auto;
        }
        #ui-panel {
            width: 800px;
            margin: 10px auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .btn {
            background-color: #2c3e50;
            color: white;
            border: 2px solid #4a90e2;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:hover { background-color: #34495e; transform: scale(1.05); }
        .btn:disabled { background-color: #555; border-color: #777; cursor: not-allowed; transform: none; }
        #oxygen-display { font-size: 24px; font-weight: bold; color: #00ffff; }
        #level-display { font-size: 20px; font-weight: bold; color: #f1c40f; }
    </style>
</head>
<body>

    <h2>🌊 深海大暴走 🌊</h2>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    
    <div id="ui-panel">
        <div class="header-info">
            <div id="level-display">當前關卡：1. 淺灘區</div>
            <div id="oxygen-display">🫧 氧氣泡泡: 0</div>
        </div>
        <div class="btn-group">
            <button id="btn-cucumber" class="btn" onclick="spawnUnit('seaCucumber')">🪼 水母寶寶 (50 🫧)</button>
            <button id="btn-shark" class="btn" onclick="spawnUnit('shark')">🦈 生氣的鯊魚 (150 🫧)</button>
            <button id="btn-squid" class="btn" onclick="spawnUnit('squid')">🐳 暴怒的鯨魚 (300 🫧)</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const oxygenDisplay = document.getElementById('oxygen-display');
        const levelDisplay = document.getElementById('level-display');

        // --- 遊戲資料庫 (數值與外觀) ---
        const unitConfigs = {
            // 我方單位
            seaCucumber: { emoji: '🪼', size: 50, hp: 100, damage: 50, speed: 1.2, range: 10, cooldown: 1, cost: 50 },
            shark:       { emoji: '🦈', size: 65, hp: 300, damage: 250, speed: 2.5, range: 15, cooldown: 0.8, cost: 150 },
            squid:       { emoji: '🐳', size: 70, hp: 2000, damage: 1000, speed: 1.0, range: 10, cooldown: 2, cost: 300 },
            
            // 敵方單位 (擴充版)
            plasticBag:  { emoji: '🛍️', size: 30, hp: 50,  damage: 5,  speed: 1.8, range: 10, cooldown: 0.8 },
            plasticCup:  { emoji: '🥤', size: 35, hp: 90,  damage: 10, speed: 1.5, range: 10, cooldown: 1 },
            batteryCrab: { emoji: '🔋', size: 40, hp: 180, damage: 25, speed: 1.2, range: 15, cooldown: 1.2 },
            tireOctopus: { emoji: '🍼', size: 50, hp: 350, damage: 20, speed: 1.0, range: 15, cooldown: 1.5 },
            oilDrum:     { emoji: '🛢️', size: 55, hp: 600, damage: 40, speed: 0.8, range: 20, cooldown: 2.0 },
            toxicSub:    { emoji: '🚢', size: 70, hp: 1200, damage: 60, speed: 0.5, range: 40, cooldown: 2.5 },
            nukeMonster: { emoji: '☢️', size: 90, hp: 4000, damage: 100, speed: 0.4, range: 50, cooldown: 2.0 } // 終極Boss
        };

        // 十大關卡設定
        const levels = [
            { id: 1,  name: "陽光淺灘",    enemyBaseHp: 400,  spawnInterval: 3.5, enemies: ['plasticBag'] },
            { id: 2,  name: "塑膠暗礁",    enemyBaseHp: 600,  spawnInterval: 3.0, enemies: ['plasticBag', 'plasticCup'] },
            { id: 3,  name: "廢電池海床",  enemyBaseHp: 900,  spawnInterval: 2.8, enemies: ['plasticCup', 'batteryCrab'] },
            { id: 4,  name: "垃圾海溝",    enemyBaseHp: 1300, spawnInterval: 2.5, enemies: ['plasticCup', 'batteryCrab', 'tireOctopus'] },
            { id: 5,  name: "廢棄輪胎山",  enemyBaseHp: 1800, spawnInterval: 2.2, enemies: ['batteryCrab', 'tireOctopus'] },
            { id: 6,  name: "漏油海域",    enemyBaseHp: 2500, spawnInterval: 2.0, enemies: ['tireOctopus', 'oilDrum'] },
            { id: 7,  name: "鋼鐵沉船",    enemyBaseHp: 3500, spawnInterval: 1.8, enemies: ['batteryCrab', 'oilDrum', 'toxicSub'] },
            { id: 8,  name: "漆黑深淵",    enemyBaseHp: 5000, spawnInterval: 1.5, enemies: ['oilDrum', 'toxicSub'] },
            { id: 9,  name: "污染核心外圍", enemyBaseHp: 7000, spawnInterval: 1.2, enemies: ['tireOctopus', 'oilDrum', 'toxicSub'] },
            { id: 10, name: "核廢料深淵",  enemyBaseHp: 9999, spawnInterval: 2.5, enemies: ['toxicSub', 'nukeMonster'] }
        ];

        // --- 遊戲狀態管理 ---
        let currentLevelIndex = 0;
        let oxygen = 0;
        let lastTime = 0;
        let spawnEnemyTimer = 0;
        let gameOver = false;
        let playerBase, enemyBase, playerUnits, enemyUnits;

        // --- 類別定義 ---
        class Base {
            constructor(x, y, team, emoji, maxHp) {
                this.x = x;
                this.y = y;
                this.width = 70;
                this.height = 70;
                this.team = team;
                this.emoji = emoji;
                this.hp = maxHp;
                this.maxHp = maxHp;
            }
            draw(ctx) {
                ctx.font = '60px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, this.x + this.width/2, this.y + this.height/2);
                
                ctx.fillStyle = 'red';
                ctx.fillRect(this.x, this.y - 20, this.width, 8);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(this.x, this.y - 20, this.width * Math.max(0, this.hp / this.maxHp), 8);
            }
        }

        class Unit {
            constructor(x, y, team, config) {
                this.x = x;
                this.y = y;
                this.team = team;
                this.emoji = config.emoji;
                this.width = config.size;
                this.height = config.size;
                this.hp = config.hp;
                this.maxHp = config.hp;
                this.damage = config.damage;
                this.speed = config.speed * (team === 'player' ? 1 : -1);
                this.range = config.range;
                this.attackCooldown = config.cooldown;
                this.currentCooldown = 0;
            }

            update(deltaTime, enemies, enemyBase) {
                if (this.currentCooldown > 0) this.currentCooldown -= deltaTime;

                let target = null;
                let minDistance = Infinity;

                enemies.forEach(enemy => {
                    let dist = Math.abs(enemy.x - this.x);
                    if (dist < minDistance && ((this.team === 'player' && enemy.x > this.x) || (this.team === 'enemy' && enemy.x < this.x))) {
                        minDistance = dist;
                        target = enemy;
                    }
                });

                let baseDist = Math.abs(enemyBase.x - this.x) - (enemyBase.width/2);
                if (baseDist < minDistance && ((this.team === 'player' && enemyBase.x > this.x) || (this.team === 'enemy' && enemyBase.x < this.x))) {
                    minDistance = baseDist;
                    target = enemyBase;
                }

                if (minDistance <= this.range + this.width/2) {
                    if (this.currentCooldown <= 0 && target) {
                        target.hp -= this.damage;
                        this.currentCooldown = this.attackCooldown;
                    }
                } else {
                    this.x += this.speed * deltaTime * 60;
                }
            }

            draw(ctx) {
                ctx.font = `${this.width}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                if (this.team === 'enemy') {
                    ctx.save();
                    ctx.translate(this.x + this.width/2, this.y + this.height/2);
                    ctx.scale(-1, 1);
                    ctx.fillText(this.emoji, 0, 0);
                    ctx.restore();
                } else {
                    ctx.fillText(this.emoji, this.x + this.width/2, this.y + this.height/2);
                }
                
                ctx.fillStyle = 'red';
                ctx.fillRect(this.x, this.y - 10, this.width, 4);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(this.x, this.y - 10, this.width * Math.max(0, this.hp / this.maxHp), 4);
            }
        }

        // --- 核心邏輯 ---
        function initLevel() {
            let levelData = levels[currentLevelIndex];
            levelDisplay.innerText = `當前關卡：${levelData.id}. ${levelData.name}`;
            
            playerBase = new Base(30, 240, 'player', '🐚', 1500); 
            enemyBase = new Base(700, 240, 'enemy', '🏭', levelData.enemyBaseHp); 
            
            playerUnits = [];
            enemyUnits = [];
            oxygen = 0;
            gameOver = false;
        }

        function spawnUnit(type) {
            let config = unitConfigs[type];
            if (oxygen >= config.cost) {
                oxygen -= config.cost;
                playerUnits.push(new Unit(playerBase.x + 60, 290 - config.size, 'player', config));
            }
        }

        function updateUI() {
            oxygenDisplay.innerText = `🫧 氧氣泡泡: ${Math.floor(oxygen)}`;
            document.getElementById('btn-cucumber').disabled = oxygen < unitConfigs.seaCucumber.cost;
            document.getElementById('btn-shark').disabled = oxygen < unitConfigs.shark.cost;
            document.getElementById('btn-squid').disabled = oxygen < unitConfigs.squid.cost;
        }

        function gameLoop(timestamp) {
            if (gameOver) return;
            const deltaTime = (timestamp - lastTime) / 1000 || 0;
            lastTime = timestamp;

            let levelData = levels[currentLevelIndex];

            // 1. 資源與出兵 (後期關卡給予稍微多一點的資源補助)
            let oxygenRate = 15 + (currentLevelIndex * 0.5); 
            oxygen += oxygenRate * deltaTime;
            updateUI();

            spawnEnemyTimer += deltaTime;
            if (spawnEnemyTimer > levelData.spawnInterval) {
                let randomEnemy = levelData.enemies[Math.floor(Math.random() * levelData.enemies.length)];
                let enemyConfig = unitConfigs[randomEnemy];
                enemyUnits.push(new Unit(enemyBase.x - 20, 290 - enemyConfig.size, 'enemy', enemyConfig));
                spawnEnemyTimer = 0;
            }

            // 2. 更新邏輯
            playerUnits.forEach(unit => unit.update(deltaTime, enemyUnits, enemyBase));
            enemyUnits.forEach(unit => unit.update(deltaTime, playerUnits, playerBase));
            playerUnits = playerUnits.filter(unit => unit.hp > 0);
            enemyUnits = enemyUnits.filter(unit => unit.hp > 0);

            // 3. 繪圖
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#112233'; 
            ctx.fillRect(0, 290, canvas.width, 110);

            playerBase.draw(ctx);
            enemyBase.draw(ctx);
            playerUnits.forEach(unit => unit.draw(ctx));
            enemyUnits.forEach(unit => unit.draw(ctx));

            // 4. 勝負與換關
            if (playerBase.hp <= 0) {
                showScreen("主堡被摧毀了... 海洋被污染了！ (重新整理網頁可重試)", true);
            } else if (enemyBase.hp <= 0) {
                if (currentLevelIndex < levels.length - 1) {
                    currentLevelIndex++;
                    showScreen(`關卡突破！進入下一區: ${levels[currentLevelIndex].name}`, false);
                    setTimeout(() => { initLevel(); requestAnimationFrame(gameLoop); }, 2000);
                    gameOver = true; 
                } else {
                    showScreen("🏆 遊戲通關！你徹底清除了所有的污染源！", true);
                }
            } else {
                requestAnimationFrame(gameLoop);
            }
        }

        function showScreen(message, isEnd) {
            gameOver = true;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(message, canvas.width/2, canvas.height/2);
        }

        // 啟動遊戲
        initLevel();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
