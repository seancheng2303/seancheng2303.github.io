<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Hole.io - 搖桿版</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #eceff1;
            /* 防止手機瀏覽器的下拉更新與原生拖曳行為 */
            touch-action: none;
            overscroll-behavior: none; 
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: Arial, sans-serif;
            color: #333;
            pointer-events: none;
        }
        h1 { margin: 0; font-size: 24px; }
        p { margin: 5px 0 0 0; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>黑洞大作戰 (行動版)</h1>
        <p id="scoreText">分數: 0 | 黑洞半徑: 20</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('scoreText');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- 遊戲變數 ---
        let score = 0;
        
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 20,
            color: '#212121',
            speed: 4 // 黑洞的基礎移動速度
        };

        const objects = [];
        const objectColors = ['#ff5252', '#448aff', '#69f0ae', '#ffd740', '#e040fb'];

        function spawnObject() {
            const radius = Math.random() * 40 + 5;
            objects.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: radius,
                color: objectColors[Math.floor(Math.random() * objectColors.length)]
            });
        }

        for (let i = 0; i < 50; i++) spawnObject();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- 虛擬搖桿狀態 ---
        const joystick = {
            active: false,
            originX: 0,
            originY: 0,
            currentX: 0,
            currentY: 0,
            maxRadius: 60 // 搖桿底座的最大半徑
        };

        // --- 統一處理滑鼠與觸控事件 (Pointer Events) ---
        canvas.addEventListener('pointerdown', (e) => {
            joystick.active = true;
            // 記錄按下的起始位置
            joystick.originX = e.clientX;
            joystick.originY = e.clientY;
            joystick.currentX = e.clientX;
            joystick.currentY = e.clientY;
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!joystick.active) return;
            joystick.currentX = e.clientX;
            joystick.currentY = e.clientY;
        });

        // 當手指離開或滑鼠放開時停止搖桿
        const stopJoystick = () => joystick.active = false;
        canvas.addEventListener('pointerup', stopJoystick);
        canvas.addEventListener('pointercancel', stopJoystick);

        // --- 核心邏輯與渲染 ---
        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 處理搖桿輸入與玩家移動
            if (joystick.active) {
                // 計算搖桿推動的距離與角度
                let dx = joystick.currentX - joystick.originX;
                let dy = joystick.currentY - joystick.originY;
                let distance = Math.hypot(dx, dy);

                // 限制搖桿控制點不能超過底盤範圍
                if (distance > joystick.maxRadius) {
                    const angle = Math.atan2(dy, dx);
                    dx = Math.cos(angle) * joystick.maxRadius;
                    dy = Math.sin(angle) * joystick.maxRadius;
                    joystick.currentX = joystick.originX + dx;
                    joystick.currentY = joystick.originY + dy;
                }

                // 根據搖桿推動的比例來決定移動速度 (推越遠走越快)
                const moveForce = distance > joystick.maxRadius ? 1 : distance / joystick.maxRadius;
                
                // 更新黑洞位置
                player.x += (dx / (distance || 1)) * player.speed * moveForce;
                player.y += (dy / (distance || 1)) * player.speed * moveForce;

                // 邊界限制：防止黑洞跑出畫面
                player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
            }

            // 2. 繪製並更新地圖物件
            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];

                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                ctx.fillStyle = obj.color;
                ctx.fill();
                ctx.closePath();

                const dx = player.x - obj.x;
                const dy = player.y - obj.y;
                const distance = Math.hypot(dx, dy);

                if (distance < player.radius && player.radius > obj.radius) {
                    objects.splice(i, 1);
                    score += Math.floor(obj.radius);
                    player.radius += obj.radius * 0.1;
                    scoreText.innerText = `分數: ${score} | 黑洞半徑: ${Math.floor(player.radius)}`;
                    spawnObject(); 
                }
            }

            // 3. 繪製玩家黑洞
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.closePath();

            // 4. 繪製虛擬搖桿 UI (覆蓋在最上層)
            if (joystick.active) {
                // 畫底盤
                ctx.beginPath();
                ctx.arc(joystick.originX, joystick.originY, joystick.maxRadius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(150, 150, 150, 0.3)';
                ctx.fill();
                ctx.closePath();

                // 畫搖桿控制點
                ctx.beginPath();
                ctx.arc(joystick.currentX, joystick.currentY, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(100, 100, 100, 0.7)';
                ctx.fill();
                ctx.closePath();
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
