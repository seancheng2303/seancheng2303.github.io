<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Hole.io - 相機縮放版</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a; /* 宇宙/深色背景 */
            touch-action: none;
            overscroll-behavior: none; 
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: Arial, sans-serif;
            color: #fff;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        h1 { margin: 0; font-size: 24px; }
        p { margin: 5px 0 0 0; font-size: 18px; font-weight: bold; color: #69f0ae; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>黑洞大作戰 (鏡頭縮放版)</h1>
        <p id="scoreText">分數: 0 | 黑洞半徑: 20 (等級 1)</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('scoreText');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- 遊戲地圖設定 ---
        const WORLD_WIDTH = 3000;
        const WORLD_HEIGHT = 3000;

        // --- 遊戲變數 ---
        let score = 0;
        
        // 玩家（座標現在是「世界座標」）
        const player = {
            x: WORLD_WIDTH / 2,
            y: WORLD_HEIGHT / 2,
            radius: 20, // 實際物理半徑
            color: '#000000',
            speed: 6
        };

        const objects = [];
        // 定義不同種類的物件
        const types = [
            { name: '行人/路燈', radiusMin: 6, radiusMax: 12, color: '#ff5252' },
            { name: '小汽車/樹木', radiusMin: 25, radiusMax: 40, color: '#448aff' },
            { name: '大建築/大樓', radiusMin: 70, radiusMax: 130, color: '#ffd740' }
        ];

        // 隨機生成物件（散落在 3000x3000 的世界中）
        function spawnObject() {
            // 隨機決定生成的物件類型（越大的越稀有）
            const rand = Math.random();
            let type = types[0]; // 預設小物件
            if (rand > 0.6 && rand <= 0.9) type = types[1]; // 中物件
            if (rand > 0.9) type = types[2]; // 大物件

            const radius = Math.random() * (type.radiusMax - type.radiusMin) + type.radiusMin;
            objects.push({
                x: Math.random() * WORLD_WIDTH,
                y: Math.random() * WORLD_HEIGHT,
                radius: radius,
                color: type.color
            });
        }

        // 初始生成 300 個物件佈滿地圖
        for (let i = 0; i < 300; i++) spawnObject();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- 虛擬搖桿（依然使用螢幕座標） ---
        const joystick = {
            active: false,
            originX: 0,
            originY: 0,
            currentX: 0,
            currentY: 0,
            maxRadius: 60
        };

        canvas.addEventListener('pointerdown', (e) => {
            joystick.active = true;
            joystick.originX = e.clientX;
            joystick.originY = e.clientY;
            joystick.currentX = e.clientX;
            joystick.currentY = e.clientY;
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!joystick.active) return;
            joystick.currentX = e.clientX;
            joystick.currentY = e.clientY;
        });

        const stopJoystick = () => joystick.active = false;
        canvas.addEventListener('pointerup', stopJoystick);
        canvas.addEventListener('pointercancel', stopJoystick);

        // --- 核心邏輯與渲染 ---
        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 處理玩家移動 (世界座標)
            if (joystick.active) {
                let dx = joystick.currentX - joystick.originX;
                let dy = joystick.currentY - joystick.originY;
                let distance = Math.hypot(dx, dy);

                if (distance > joystick.maxRadius) {
                    const angle = Math.atan2(dy, dx);
                    dx = Math.cos(angle) * joystick.maxRadius;
                    dy = Math.sin(angle) * joystick.maxRadius;
                    joystick.currentX = joystick.originX + dx;
                    joystick.currentY = joystick.originY + dy;
                }

                const moveForce = distance > joystick.maxRadius ? 1 : distance / joystick.maxRadius;
                
                player.x += (dx / (distance || 1)) * player.speed * moveForce;
                player.y += (dy / (distance || 1)) * player.speed * moveForce;

                // 限制在 3000x3000 的世界邊界內
                player.x = Math.max(player.radius, Math.min(WORLD_WIDTH - player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(WORLD_HEIGHT - player.radius, player.y));
            }

            // 2. 計算相機縮放比例 (視覺核心)
            // 數學公式：讓鏡頭隨著半徑變大而均勻拉遠
            // 使用開根號 (Math.sqrt) 可以讓縮放感更平滑，既有長大的感覺，畫面又放得夠大
            const zoom = Math.sqrt(20 / player.radius); 

            // 3. 開始繪製「世界空間」 (套用相機矩陣)
            ctx.save();
            
            // 步驟 A: 將畫布中心移到螢幕中央
            ctx.translate(canvas.width / 2, canvas.height / 2);
            // 步驟 B: 根據黑洞大小縮放整個世界
            ctx.scale(zoom, zoom);
            // 步驟 C: 將鏡頭對準玩家的世界座標
            ctx.translate(-player.x, -player.y);

            // 【開始繪製世界內的東西】
            
            // 繪製世界邊界（城市網格底座）
            ctx.fillStyle = '#eceff1';
            ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
            
            // 繪製邊界線，讓玩家知道哪裡是盡頭
            ctx.strokeStyle = '#b0bec5';
            ctx.lineWidth = 10;
            ctx.strokeRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

            // 繪製並更新地圖物件
            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];

                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                ctx.fillStyle = obj.color;
                ctx.fill();
                ctx.closePath();

                // 核心碰撞偵測（在世界座標下計算）
                const dx = player.x - obj.x;
                const dy = player.y - obj.y;
                const distance = Math.hypot(dx, dy);

                // 只有當黑洞半徑大於物件半徑時才能吞噬
                if (distance < player.radius && player.radius > obj.radius) {
                    objects.splice(i, 1);
                    score += Math.floor(obj.radius);
                    player.radius += obj.radius * 0.08; // 稍微調低成長速度，手感更好
                    
                    // 計算當前黑洞等級
                    const level = Math.floor(player.radius / 20);
                    scoreText.innerText = `分數: ${score} | 黑洞半徑: ${Math.floor(player.radius)} (等級 ${level})`;
                    
                    spawnObject(); 
                }
            }

            // 繪製玩家黑洞
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.closePath();

            // 恢復畫布狀態，避免相機縮放影響到 UI
            ctx.restore();

            // 4. 繪製虛擬搖桿 UI (不隨相機縮放，保持在螢幕固定位置)
            if (joystick.active) {
                ctx.beginPath();
                ctx.arc(joystick.originX, joystick.originY, joystick.maxRadius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 2;
                ctx.fill();
                ctx.stroke();
                ctx.closePath();

                ctx.beginPath();
                ctx.arc(joystick.currentX, joystick.currentY, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();
                ctx.closePath();
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
