<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Hole.io - 搖桿高度 200px 優化版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0; overflow: hidden; background-color: #111;
            font-family: 'Segoe UI', Arial, sans-serif; touch-action: none; overscroll-behavior: none; user-select: none;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 20, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; color: white;
        }
        h1 { font-size: 36px; margin-bottom: 10px; color: #69f0ae; text-shadow: 0 0 10px rgba(105,240,174,0.3); }
        .subtitle { font-size: 18px; color: #b0bec5; margin-bottom: 30px; }
        .btn {
            padding: 15px 40px; font-size: 18px; margin: 10px; cursor: pointer;
            border: none; border-radius: 25px; background: #448aff; color: white;
            font-weight: bold; transition: 0.2s; width: 260px; box-shadow: 0 4px 15px rgba(68,138,255,0.4);
        }
        .btn:hover { background: #2979ff; transform: scale(1.05); }
        
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            pointer-events: none; display: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 5;
        }
        .stat { font-size: 20px; font-weight: bold; margin: 5px 0; }
        #timerText { color: #ff5252; }
        #targetText { color: #ffd740; }

        /* 【修改點】虛擬搖桿位置再往上調高到 200px (bottom 改為 200px) */
        #joystickBound {
            position: absolute; bottom: 200px; right: 50px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; display: none; justify-content: center; align-items: center; z-index: 5;
        }
        #joystickStick { width: 50px; height: 50px; background: rgba(255,255,255,0.6); border-radius: 50%; position: absolute; }
    </style>
</head>
<body>

    <div id="menu" class="overlay">
        <h1>黑洞大作戰 3D</h1>
        <div class="subtitle">請選擇您的遊玩設備</div>
        <button class="btn" onclick="selectDevice('pc')">💻 電腦 (滑鼠控制)</button>
        <button class="btn" onclick="selectDevice('mobile')">📱 手機 / 平板 (右側 200px 高搖桿)</button>
    </div>

    <div id="resultMenu" class="overlay" style="display: none;">
        <h1 id="resultTitle">關卡成功！</h1>
        <div id="resultDetails" class="subtitle">您的得分：0</div>
        <button id="resultBtn" class="btn" onclick="nextLevelAction()">下一關</button>
    </div>

    <div id="ui">
        <h2 id="levelName" style="margin:0; color:#69f0ae;">Level 1</h2>
        <div class="stat" id="targetText">目標分數: 450</div>
        <div class="stat" id="scoreText">目前分數: 0</div>
        <div class="stat" id="timerText">剩餘時間: 60s</div>
    </div>

    <div id="joystickBound"><div id="joystickStick"></div></div>

    <script>
        const LEVELS = [
            { name: "Level 1: 溫馨小城鎮", targetScore: 450, timeLimit: 60, smallRatio: 0.8, medRatio: 0.2, largeRatio: 0.0, totalObjs: 120 },
            { name: "Level 2: 大都會中心", targetScore: 1000, timeLimit: 90, smallRatio: 0.4, medRatio: 0.4, largeRatio: 0.2, totalObjs: 160 },
            { name: "Level 3: 摩天大樓陣", targetScore: 2000, timeLimit: 120, smallRatio: 0.1, medRatio: 0.2, largeRatio: 0.7, totalObjs: 200 }
        ];

        let currentLevelIndex = 0;
        let deviceType = 'pc';
        let scene, camera, renderer, playerHole;
        let score = 0;
        let playerRadius = 1.5; 
        let timeLeft = 60;
        let gameActive = false;
        let timerInterval;
        const objects = [];
        const worldSize = 200; 

        const joystick = { active: false, oX: 0, oY: 0, maxR: 60, dx: 0, dy: 0 };
        let mouseX = 0, mouseZ = 0;

        function selectDevice(type) {
            deviceType = type;
            document.getElementById('menu').style.display = 'none';
            build3DBase();
            startLevel(0);
        }

        function build3DBase() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; 
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(40, 100, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // 地面
            const floorGeo = new THREE.BoxGeometry(worldSize, 2, worldSize);
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x455a64 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.position.y = -1; 
            floor.receiveShadow = true;
            scene.add(floor);

            // 玩家黑洞
            const holeGeo = new THREE.RingGeometry(0, 1, 32);
            const holeMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
            playerHole = new THREE.Mesh(holeGeo, holeMat);
            playerHole.rotation.x = Math.PI / 2; 
            playerHole.position.set(0, 0.02, 0); 
            scene.add(playerHole);

            if (deviceType === 'mobile') {
                document.getElementById('joystickBound').style.display = 'flex';
                setupMobileControls();
            } else {
                setupPCControls();
            }

            window.addEventListener('resize', onWindowResize);
            animate(); 
        }

        function startLevel(index) {
            currentLevelIndex = index;
            const lvl = LEVELS[currentLevelIndex];

            score = 0;
            playerRadius = 1.5;
            timeLeft = lvl.timeLimit;
            playerHole.position.set(0, 0.02, 0);
            playerHole.scale.set(playerRadius, playerRadius, 1);

            while(objects.length > 0) {
                const obj = objects.pop();
                scene.remove(obj.mesh);
            }

            const colors = [0xff5252, 0x448aff, 0xffd740, 0x69f0ae, 0xe040fb];
            for (let i = 0; i < lvl.totalObjs; i++) {
                let rand = Math.random();
                let geo, w, h, d, objType;

                if (rand < lvl.smallRatio) { 
                    w = d = Math.random() * 0.4 + 0.3; h = Math.random() * 2 + 1; 
                    objType = 'small';
                } else if (rand < lvl.smallRatio + lvl.medRatio) { 
                    w = Math.random() * 1.0 + 1.5; d = Math.random() * 1.0 + 1.5; h = Math.random() * 3 + 3; 
                    objType = 'medium';
                } else { 
                    w = d = Math.random() * 2.5 + 3.5; h = Math.random() * 15 + 12; 
                    objType = 'large';
                }

                geo = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshLambertMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
                const mesh = new THREE.Mesh(geo, mat);
                
                mesh.position.set(
                    (Math.random() - 0.5) * (worldSize - 20),
                    h / 2, 
                    (Math.random() - 0.5) * (worldSize - 20)
                );
                mesh.castShadow = true;
                mesh.receiveShadow = true;

                scene.add(mesh);
                let realRadius = Math.hypot(w, d) / 2;
                objects.push({ mesh: mesh, radius: realRadius, type: objType, height: h });
            }

            document.getElementById('levelName').innerText = lvl.name;
            document.getElementById('targetText').innerText = `目標分數: ${lvl.targetScore}`;
            document.getElementById('scoreText').innerText = `目前分數: 0`;
            document.getElementById('timerText').innerText = `剩餘時間: ${timeLeft}s`;
            
            document.getElementById('resultMenu').style.display = 'none';
            document.getElementById('ui').style.display = 'block';

            clearInterval(timerInterval);
            gameActive = true;
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                timeLeft--;
                document.getElementById('timerText').innerText = `剩餘時間: ${timeLeft}s`;
                if (timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function endGame(reachedTarget) {
            gameActive = false;
            clearInterval(timerInterval);
            
            const lvl = LEVELS[currentLevelIndex];
            const isWin = score >= lvl.targetScore || reachedTarget;
            const resultTitle = document.getElementById('resultTitle');
            const resultDetails = document.getElementById('resultDetails');
            const resultBtn = document.getElementById('resultBtn');

            if (isWin) {
                resultTitle.innerText = "🎉 關卡成功！";
                resultTitle.style.color = "#69f0ae";
                resultBtn.innerText = (currentLevelIndex < LEVELS.length - 1) ? "挑戰下一關" : "再玩一次 (通關大滿貫)";
            } else {
                resultTitle.innerText = "❌ 挑戰失敗！";
                resultTitle.style.color = "#ff5252";
                resultBtn.innerText = "重新挑戰本關";
            }

            resultDetails.innerText = `最終分數：${score} / 目標分數：${lvl.targetScore}`;
            document.getElementById('ui').style.display = 'none';
            document.getElementById('resultMenu').style.display = 'flex';
        }

        function nextLevelAction() {
            if (score >= LEVELS[currentLevelIndex].targetScore) {
                let nextIndex = currentLevelIndex + 1;
                if (nextIndex >= LEVELS.length) nextIndex = 0;
                startLevel(nextIndex);
            } else {
                startLevel(currentLevelIndex);
            }
        }

        function setupPCControls() {
            window.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) - 0.5;
                mouseZ = (e.clientY / window.innerHeight) - 0.5;
            });
        }

        function setupMobileControls() {
            const bound = document.getElementById('joystickBound');
            const stick = document.getElementById('joystickStick');
            const updateOrigin = () => {
                const rect = bound.getBoundingClientRect();
                joystick.oX = rect.left + rect.width / 2;
                joystick.oY = rect.top + rect.height / 2;
            };
            updateOrigin();

            window.addEventListener('pointerdown', (e) => {
                updateOrigin();
                if (Math.hypot(e.clientX - joystick.oX, e.clientY - joystick.oY) < 100) joystick.active = true;
            });
            window.addEventListener('pointermove', (e) => {
                if (!joystick.active) return;
                let dx = e.clientX - joystick.oX; let dy = e.clientY - joystick.oY;
                let dist = Math.hypot(dx, dy);
                if (dist > joystick.maxR) { dx = (dx / dist) * joystick.maxR; dy = (dy / dist) * joystick.maxR; }
                stick.style.transform = `translate(${dx}px, ${dy}px)`;
                joystick.dx = dx / joystick.maxR; joystick.dy = dy / joystick.maxR;
            });
            const stopL = () => {
                joystick.active = false; stick.style.transform = 'translate(0px, 0px)';
                joystick.dx = 0; joystick.dy = 0;
            };
            window.addEventListener('pointerup', stopL); window.addEventListener('pointercancel', stopL);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) {
                renderer.render(scene, camera);
                return;
            }

            let moveX = 0, moveZ = 0;
            const speed = 0.18; 

            if (deviceType === 'pc') {
                if (Math.hypot(mouseX, mouseZ) > 0.05) { moveX = mouseX * speed * 2; moveZ = mouseZ * speed * 2; }
            } else if (deviceType === 'mobile' && joystick.active) {
                moveX = joystick.dx * speed; moveZ = joystick.dy * speed;
            }

            playerHole.position.x += moveX; playerHole.position.z += moveZ;
            playerHole.position.x = Math.max(-worldSize/2, Math.min(worldSize/2, playerHole.position.x));
            playerHole.position.z = Math.max(-worldSize/2, Math.min(worldSize/2, playerHole.position.z));

            // 完全包覆吞噬與物理傾倒
            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];
                let dx = playerHole.position.x - obj.mesh.position.x;
                let dz = playerHole.position.z - obj.mesh.position.z;
                let dist = Math.hypot(dx, dz);

                // 完全包覆判定法
                if (dist + obj.radius <= playerRadius) {
                    
                    let dirX = dx / (dist || 1);
                    let dirZ = dz / (dist || 1);
                    let rotAxis = new THREE.Vector3(dirZ, 0, -dirX).normalize();
                    
                    obj.mesh.rotateOnAxis(rotAxis, 0.08); 
                    obj.mesh.position.y -= 0.5; 
                    obj.mesh.scale.multiplyScalar(0.92); 

                    if (obj.mesh.position.y < -obj.height / 2 || obj.mesh.scale.x < 0.05) {
                        scene.remove(obj.mesh);
                        objects.splice(i, 1);

                        score += (obj.type === 'small' ? 10 : obj.type === 'medium' ? 30 : 150);
                        playerRadius += (obj.type === 'small' ? 0.04 : obj.type === 'medium' ? 0.12 : 0.4);
                        playerHole.scale.set(playerRadius, playerRadius, 1);
                        
                        document.getElementById('scoreText').innerText = `目前分數: ${score}`;

                        if (score >= LEVELS[currentLevelIndex].targetScore) {
                            endGame(true);
                        }
                    }
                }
            }

            // 相機跟隨
            let targetCamY = 15 + (playerRadius * 3); 
            let targetCamZ = 12 + (playerRadius * 2.5);
            camera.position.x += (playerHole.position.x - camera.position.x) * 0.1;
            camera.position.y += ((playerHole.position.y + targetCamY) - camera.position.y) * 0.1;
            camera.position.z += ((playerHole.position.z + targetCamZ) - camera.position.z) * 0.1;
            camera.lookAt(playerHole.position);

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
