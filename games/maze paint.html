<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Paint - 終極完美無Bug版</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #121212; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation; 
        }
        
        .game-container {
            position: relative;
            background-color: #1e1e2f;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .header-container {
            text-align: center;
            margin-bottom: 15px;
        }
        h1 {
            color: #00d2d3;
            margin: 0;
            font-size: 26px;
        }
        .level-badge {
            background-color: #ff9f43;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            display: inline-block;
            margin-top: 8px;
        }

        /* 重新開始按鈕 (絕對定位在右上角) */
        .restart-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #ee5253;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px #b33939;
            transition: transform 0.05s;
        }
        .restart-btn:active {
            box-shadow: 0 0px #b33939;
            transform: translateY(3px);
        }

        canvas {
            border: 4px solid #341f97;
            border-radius: 10px;
            background-color: #ffffff;
            display: block;
        }
        #message {
            margin-top: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #1dd1a1;
            height: 28px;
            text-align: center;
        }

        /* 方向鍵 */
        .dpad-container {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }
        .dpad-btn {
            background-color: #341f97;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px #221366;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .dpad-btn:active {
            box-shadow: 0 0px #221366;
            transform: translateY(4px);
        }
        #btnUp    { grid-column: 2; grid-row: 1; }
        #btnLeft  { grid-column: 1; grid-row: 2; }
        #btnDown  { grid-column: 2; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div class="game-container">
        <button class="restart-btn" id="restartBtn">🔄 重置</button>

        <div class="header-container">
            <h1>Maze Paint 終極版</h1>
            <div class="level-badge" id="levelDisplay">關卡: 1 / 1000</div>
        </div>
        
        <canvas id="gameCanvas" width="360" height="360"></canvas>
        <div id="message"></div>
    </div>

    <div class="dpad-container">
        <button id="btnUp" class="dpad-btn">▲</button>
        <button id="btnLeft" class="dpad-btn">◀</button>
        <button id="btnDown" class="dpad-btn">▼</button>
        <button id="btnRight" class="dpad-btn">▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const messageDiv = document.getElementById('message');
        const levelDisplay = document.getElementById('levelDisplay');

        let currentLevel = 1;
        const maxLevels = 1000;
        
        let maze = [];
        let originalMaze = []; // 紀錄初始狀態，用於重新開始
        let mazeSize = 15; // 起始尺寸
        let tileSize = 0; 
        let isGameOver = false;

        let player = { x: 1, y: 1, color: '#ff9f43' };

        // 核心修正：承重牆保護演算法 (保證絕對有解)
        function generatePerfectMaze(size) {
            // 初始化：1 代表普通牆壁
            let newMaze = Array(size).fill().map(() => Array(size).fill(1));
            newMaze[1][1] = 0;
            let nodes = [[1, 1]];

            while(nodes.length > 0) {
                // 混合 DFS 與 BFS，讓迷宮既深又廣
                let idx = nodes.length - 1; 
                if (Math.random() < 0.4) idx = Math.floor(Math.random() * nodes.length);
                
                let [r, c] = nodes[idx];
                let carved = false;
                
                let dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]].sort(() => Math.random() - 0.5);
                
                for (let [dr, dc] of dirs) {
                    let validLengths = [];
                    // 探測可挖長度
                    for (let len = 1; len < size - 2; len++) {
                        let endR = r + dr * len;
                        let endC = c + dc * len;
                        
                        if (endR <= 0 || endR >= size - 1 || endC <= 0 || endC >= size - 1) break;
                        
                        let isValid = true;
                        for (let step = 1; step <= len; step++) {
                            let pr = r + dr * step;
                            let pc = c + dc * step;
                            
                            // 【關鍵防護】只能挖一般牆壁(1)。絕對不可以挖到受保護的煞車牆(3)
                            if (newMaze[pr][pc] !== 1) { isValid = false; break; }
                            
                            // 防止平行的通道互相打通
                            if (dr === 0) {
                                if (newMaze[pr-1][pc] === 0 || newMaze[pr+1][pc] === 0) { isValid = false; break; }
                            } else {
                                if (newMaze[pr][pc-1] === 0 || newMaze[pr][pc+1] === 0) { isValid = false; break; }
                            }
                        }
                        
                        // 確保終點的下一格不是空地 (確保有牆可撞)
                        let nextR = r + dr * (len + 1);
                        let nextC = c + dc * (len + 1);
                        if (nextR >= 0 && nextR < size && nextC >= 0 && nextC < size) {
                            if (newMaze[nextR][nextC] === 0) isValid = false;
                        }
                        
                        if (isValid) {
                            validLengths.push(len);
                        } else {
                            break; 
                        }
                    }
                    
                    if (validLengths.length > 0) {
                        // 偏好較長的滑行距離
                        let chosenLen = validLengths[validLengths.length - 1];
                        if (Math.random() < 0.2 && validLengths.length > 1) {
                            chosenLen = validLengths[Math.floor(Math.random() * (validLengths.length - 1))];
                        }
                        
                        // 開挖
                        for (let step = 1; step <= chosenLen; step++) {
                            newMaze[r + dr * step][c + dc * step] = 0;
                        }
                        
                        // 【終極防線】將煞車點的牆壁升級為「保護牆 (3)」，確保它未來不被其他通道挖斷
                        let stopR = r + dr * (chosenLen + 1);
                        let stopC = c + dc * (chosenLen + 1);
                        if (stopR >= 0 && stopR < size && stopC >= 0 && stopC < size) {
                            newMaze[stopR][stopC] = 3; 
                        }

                        nodes.push([r + dr * chosenLen, c + dc * chosenLen]);
                        carved = true;
                        break;
                    }
                }
                
                if (!carved) nodes.splice(idx, 1);
            }
            return newMaze;
        }

        function startNewLevel() {
            isGameOver = false;
            messageDiv.innerText = '';
            levelDisplay.innerText = `關卡: ${currentLevel} / ${maxLevels}`;

            // 難度隨關卡提升，最多放大到 25x25
            mazeSize = 11 + Math.min(14, Math.floor((currentLevel - 1) / 3)) * 2;
            tileSize = canvas.width / mazeSize;

            maze = generatePerfectMaze(mazeSize);
            
            // 備份原始地圖，用於重新開始按鈕
            originalMaze = maze.map(row => [...row]); 

            resetPlayer();
            draw();
        }

        function resetLevel() {
            if (isGameOver) return;
            // 從備份還原
            maze = originalMaze.map(row => [...row]);
            resetPlayer();
            draw();
        }

        function resetPlayer() {
            player.x = 1;
            player.y = 1;
            maze[1][1] = 2; // 將起點塗色
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let r = 0; r < mazeSize; r++) {
                for (let c = 0; c < mazeSize; c++) {
                    // 1 是普通牆壁，3 是受保護的承重牆，顯示上一律當作牆壁
                    if (maze[r][c] === 1 || maze[r][c] === 3) {
                        ctx.fillStyle = '#1e1e2f'; // 牆壁顏色
                    } else if (maze[r][c] === 2) {
                        ctx.fillStyle = player.color; // 塗色
                    } else {
                        ctx.fillStyle = '#c8d6e5'; // 空地
                    }
                    
                    ctx.fillRect(c * tileSize, r * tileSize, Math.ceil(tileSize), Math.ceil(tileSize));
                }
            }

            ctx.beginPath();
            ctx.arc(
                player.x * tileSize + tileSize / 2,
                player.y * tileSize + tileSize / 2,
                tileSize / 2.3, 
                0,
                Math.PI * 2
            );
            ctx.fillStyle = '#ffffff'; 
            ctx.fill();
            ctx.closePath();
        }

        function move(dx, dy) {
            if (isGameOver) return;
            let moved = false;

            // 只要下一步不是 1 (普通牆) 且不是 3 (受保護牆)，就繼續滑
            let nextCell = maze[player.y + dy][player.x + dx];
            while (nextCell === 0 || nextCell === 2) {
                player.x += dx;
                player.y += dy;
                maze[player.y][player.x] = 2; 
                moved = true;
                nextCell = maze[player.y + dy][player.x + dx];
            }

            if (moved) {
                draw();
                checkWin();
            }
        }

        function checkWin() {
            let hasUnpainted = false;
            for (let r = 0; r < mazeSize; r++) {
                if (maze[r].includes(0)) { 
                    hasUnpainted = true;
                    break;
                }
            }

            if (!hasUnpainted) {
                isGameOver = true;
                messageDiv.innerText = '🔥 完美過關！';
                currentLevel++;
                setTimeout(startNewLevel, 1000);
            }
        }

        window.addEventListener('keydown', (e) => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': move(0, -1); break;
                case 'ArrowDown': case 's': case 'S': move(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': move(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': move(1, 0); break;
            }
        });

        document.getElementById('btnUp').addEventListener('click', () => move(0, -1));
        document.getElementById('btnDown').addEventListener('click', () => move(0, 1));
        document.getElementById('btnLeft').addEventListener('click', () => move(-1, 0));
        document.getElementById('btnRight').addEventListener('click', () => move(1, 0));
        
        document.getElementById('restartBtn').addEventListener('click', resetLevel);

        startNewLevel();
    </script>
</body>
</html>
