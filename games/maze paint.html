<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Paint 完美邏輯版</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1e272e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation; 
        }
        .header-container {
            text-align: center;
            margin-bottom: 10px;
        }
        h1 {
            color: #d2dae2;
            margin: 0;
            font-size: 26px;
        }
        .level-badge {
            background-color: #f39c12;
            color: white;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.5);
        }
        canvas {
            border: 4px solid #f39c12;
            border-radius: 10px;
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #message {
            margin-top: 8px;
            font-size: 20px;
            font-weight: bold;
            color: #f1c40f;
            height: 28px;
        }
        .dpad-container {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
            margin-top: 15px;
        }
        .dpad-btn {
            background-color: #f39c12;
            color: #1e272e;
            border: none;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px #e67e22;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: transform 0.05s;
        }
        .dpad-btn:active {
            box-shadow: 0 0px #e67e22;
            transform: translateY(4px);
            background-color: #e67e22;
        }
        #btnUp    { grid-column: 2; grid-row: 1; }
        #btnLeft  { grid-column: 1; grid-row: 2; }
        #btnDown  { grid-column: 2; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Maze Paint 完美邏輯版</h1>
        <div class="level-badge" id="levelDisplay">關卡: 1 / 1000</div>
    </div>
    
    <canvas id="gameCanvas" width="390" height="390"></canvas>
    <div id="message"></div>

    <div class="dpad-container">
        <button id="btnUp" class="dpad-btn">▲</button>
        <button id="btnLeft" class="dpad-btn">◀</button>
        <button id="btnDown" class="dpad-btn">▼</button>
        <button id="btnRight" class="dpad-btn">▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const messageDiv = document.getElementById('message');
        const levelDisplay = document.getElementById('levelDisplay');

        let currentLevel = 1;
        const maxLevels = 1000;
        
        let maze = [];
        let mazeSize = 7; 
        let tileSize = 0; 
        let isGameOver = false;

        const player = { x: 1, y: 1, color: '#e74c3c' };

        function startNewLevel() {
            isGameOver = false;
            messageDiv.innerText = '';
            levelDisplay.innerText = `關卡: ${currentLevel} / ${maxLevels}`;

            // 難度隨關卡提升，地圖變大
            mazeSize = 7 + Math.min(10, Math.floor((currentLevel - 1) / 3)) * 2;
            tileSize = canvas.width / mazeSize;

            // 1. 初始化全牆壁地圖
            maze = Array(mazeSize).fill().map(() => Array(mazeSize).fill(1));
            maze[1][1] = 0;
            
            // 2. 核心修正：滑動式開路演算法 (保證 100% 可解)
            let nodes = [[1, 1]];
            
            while(nodes.length > 0) {
                // 模擬真實玩家，從可以煞車的點開始找方向挖路
                let idx = nodes.length - 1; 
                if (Math.random() < 0.2) idx = Math.floor(Math.random() * nodes.length);
                
                let [r, c] = nodes[idx];
                let carved = false;
                
                let dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]].sort(() => Math.random() - 0.5);
                
                for (let [dr, dc] of dirs) {
                    let validLengths = [];
                    // 探測這個方向可以滑多遠
                    for (let len = 2; len < mazeSize - 1; len++) {
                        let endR = r + dr * len;
                        let endC = c + dc * len;
                        
                        // 確保不挖出邊界
                        if (endR <= 0 || endR >= mazeSize - 1 || endC <= 0 || endC >= mazeSize - 1) break;
                        
                        let isValid = true;
                        for (let step = 1; step <= len; step++) {
                            let pr = r + dr * step;
                            let pc = c + dc * step;
                            if (maze[pr][pc] === 0) { isValid = false; break; }
                            
                            // 檢查兩側，確保路徑不會跟其他路徑黏在一起導致失去牆壁
                            if (dr === 0) {
                                if (maze[pr-1][pc] === 0 || maze[pr+1][pc] === 0) { isValid = false; break; }
                            } else {
                                if (maze[pr][pc-1] === 0 || maze[pr][pc+1] === 0) { isValid = false; break; }
                            }
                        }
                        
                        // 確保路徑終點的下一格是牆壁，這樣玩家滑過來才有煞車點
                        let nextR = r + dr * (len + 1);
                        let nextC = c + dc * (len + 1);
                        if (nextR >= 0 && nextR < mazeSize && nextC >= 0 && nextC < mazeSize) {
                            if (maze[nextR][nextC] === 0) isValid = false;
                        }
                        
                        if (isValid) {
                            validLengths.push(len);
                        } else {
                            break; 
                        }
                    }
                    
                    if (validLengths.length > 0) {
                        // 優先選擇較長的路徑，增加爽快感
                        let chosenLen = validLengths[validLengths.length - 1];
                        if (Math.random() < 0.3) chosenLen = validLengths[Math.floor(Math.random() * validLengths.length)];
                        
                        // 實際開挖
                        for (let step = 1; step <= chosenLen; step++) {
                            maze[r + dr * step][c + dc * step] = 0;
                        }
                        // 把新的煞車點加入清單，作為未來的起點
                        nodes.push([r + dr * chosenLen, c + dc * chosenLen]);
                        carved = true;
                        break;
                    }
                }
                
                // 如果這個點四面八方都不能挖了，就把它從清單移除
                if (!carved) {
                    nodes.splice(idx, 1);
                }
            }

            player.x = 1;
            player.y = 1;
            maze[1][1] = 2; // 起點自動塗色

            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let r = 0; r < mazeSize; r++) {
                for (let c = 0; c < mazeSize; c++) {
                    if (maze[r][c] === 1) {
                        ctx.fillStyle = '#1e272e'; // 牆壁
                    } else if (maze[r][c] === 2) {
                        ctx.fillStyle = '#f39c12'; // 塗色 (橘色)
                    } else {
                        ctx.fillStyle = '#ecf0f1'; // 空白路徑
                    }
                    ctx.fillRect(c * tileSize, r * tileSize, Math.ceil(tileSize), Math.ceil(tileSize));
                    
                    if (maze[r][c] !== 1 && mazeSize < 20) {
                        ctx.strokeStyle = '#bdc3c7';
                        ctx.strokeRect(c * tileSize, r * tileSize, tileSize, tileSize);
                    }
                }
            }

            ctx.beginPath();
            ctx.arc(
                player.x * tileSize + tileSize / 2,
                player.y * tileSize + tileSize / 2,
                tileSize / 2.6, 
                0,
                Math.PI * 2
            );
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.closePath();
        }

        function move(dx, dy) {
            if (isGameOver) return;
            let moved = false;

            while (maze[player.y + dy][player.x + dx] !== 1) {
                player.x += dx;
                player.y += dy;
                maze[player.y][player.x] = 2; 
                moved = true;
            }

            if (moved) {
                draw();
                checkWin();
            }
        }

        function checkWin() {
            let hasUnpainted = false;
            for (let r = 0; r < mazeSize; r++) {
                if (maze[r].includes(0)) { 
                    hasUnpainted = true;
                    break;
                }
            }

            if (!hasUnpainted) {
                isGameOver = true;
                if (currentLevel >= maxLevels) {
                    messageDiv.innerText = '🏆 封神！1000關全破！';
                } else {
                    messageDiv.innerText = '🔥 完美！準備進入下一關...';
                    currentLevel++;
                    setTimeout(startNewLevel, 1000);
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': move(0, -1); break;
                case 'ArrowDown': case 's': case 'S': move(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': move(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': move(1, 0); break;
            }
        });

        document.getElementById('btnUp').addEventListener('click', () => move(0, -1));
        document.getElementById('btnDown').addEventListener('click', () => move(0, 1));
        document.getElementById('btnLeft').addEventListener('click', () => move(-1, 0));
        document.getElementById('btnRight').addEventListener('click', () => move(1, 0));

        startNewLevel();
    </script>
</body>
</html>
