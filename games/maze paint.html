<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Paint 1000關極限挑戰</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation; 
        }
        .header-container {
            text-align: center;
            margin-bottom: 10px;
        }
        h1 {
            color: #2c3e50;
            margin: 0;
            font-size: 26px;
        }
        .level-badge {
            background-color: #e74c3c;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
        }
        canvas {
            border: 4px solid #34495e;
            border-radius: 10px;
            background-color: #ffffff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        #message {
            margin-top: 8px;
            font-size: 20px;
            font-weight: bold;
            color: #2ecc71;
            height: 28px;
        }

        /* 十字方向鍵佈局 */
        .dpad-container {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
            margin-top: 15px;
        }
        .dpad-btn {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px #2980b9;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: transform 0.05s;
        }
        .dpad-btn:active {
            box-shadow: 0 0px #2980b9;
            transform: translateY(4px);
            background-color: #2980b9;
        }
        #btnUp    { grid-column: 2; grid-row: 1; }
        #btnLeft  { grid-column: 1; grid-row: 2; }
        #btnDown  { grid-column: 2; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Maze Paint 迷宮塗色</h1>
        <div class="level-badge" id="levelDisplay">關卡: 1 / 1000</div>
    </div>
    
    <canvas id="gameCanvas" width="390" height="390"></canvas>
    <div id="message"></div>

    <div class="dpad-container">
        <button id="btnUp" class="dpad-btn">▲</button>
        <button id="btnLeft" class="dpad-btn">◀</button>
        <button id="btnDown" class="dpad-btn">▼</button>
        <button id="btnRight" class="dpad-btn">▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const messageDiv = document.getElementById('message');
        const levelDisplay = document.getElementById('levelDisplay');

        let currentLevel = 1;
        const maxLevels = 1000;
        
        let maze = [];
        let mazeSize = 7; // 迷宮寬高（必須是奇數）
        let tileSize = 0; // 每個格子的大小，會動態計算
        let isGameOver = false;

        // 玩家狀態
        const player = { x: 1, y: 1, color: '#ff4757' };

        // =================【核心：演算法生成隨機迷宮】=================
        function startNewLevel() {
            isGameOver = false;
            messageDiv.innerText = '';
            levelDisplay.innerText = `關卡: ${currentLevel} / ${maxLevels}`;

            // 難度曲線設計：每過 5 關，迷宮尺寸就變大，最大到 27x27 (再大手機螢幕會看太吃力)
            // 7x7 -> 9x9 -> 11x11 -> ... -> 27x27
            mazeSize = 7 + Math.min(10, Math.floor((currentLevel - 1) / 5)) * 2;
            
            // 動態計算格子的像素大小，確保完美的填滿 390px 的畫布
            tileSize = canvas.width / mazeSize;

            // 1. 初始化全都是牆壁 (1) 的地圖
            maze = Array(mazeSize).fill().map(() => Array(mazeSize).fill(1));

            // 2. 使用 DFS 演算法掘路
            function carve(r, c) {
                maze[r][c] = 0; // 挖成通道

                // 隨機打亂四個方向（每次移動 2 格以保留牆壁厚度）
                const dirs = [[-2, 0], [2, 0], [0, -2], [0, 2]].sort(() => Math.random() - 0.5);

                for (let [dr, dc] of dirs) {
                    let nr = r + dr;
                    let nc = c + dc;

                    // 檢查邊界，且目標位置必須還是牆壁
                    if (nr > 0 && nr < mazeSize - 1 && nc > 0 && nc < mazeSize - 1 && maze[nr][nc] === 1) {
                        maze[r + dr / 2][c + dc / 2] = 0; // 打通中間的牆壁
                        carve(nr, nc); // 遞迴繼續挖
                    }
                }
            }

            // 從 (1,1) 開始掘路生成迷宮
            carve(1, 1);

            // 3. 重設玩家到起點，並把起點設為已塗色 (2)
            player.x = 1;
            player.y = 1;
            maze[1][1] = 2;

            draw();
        }

        // =================【畫面繪製】=================
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 繪製地圖
            for (let r = 0; r < mazeSize; r++) {
                for (let c = 0; c < mazeSize; c++) {
                    if (maze[r][c] === 1) {
                        ctx.fillStyle = '#2c3e50'; // 牆壁
                    } else if (maze[r][c] === 2) {
                        ctx.fillStyle = '#1abc9c'; // 已塗色路徑
                    } else {
                        ctx.fillStyle = '#ffffff'; // 未塗色空白路徑
                    }
                    // 使用 Math.ceil 防止因為浮點數除法產生的格子微小縫隙
                    ctx.fillRect(c * tileSize, r * tileSize, Math.ceil(tileSize), Math.ceil(tileSize));
                    
                    if (maze[r][c] !== 1 && mazeSize < 15) {
                        ctx.strokeStyle = '#f1f2f6';
                        ctx.strokeRect(c * tileSize, r * tileSize, tileSize, tileSize);
                    }
                }
            }

            // 繪製玩家彩球
            ctx.beginPath();
            ctx.arc(
                player.x * tileSize + tileSize / 2,
                player.y * tileSize + tileSize / 2,
                tileSize / 2.6, // 依比例縮放球體大小
                0,
                Math.PI * 2
            );
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.closePath();
        }

        // =================【遊戲邏輯】=================
        function move(dx, dy) {
            if (isGameOver) return;

            let moved = false;

            // 一滑到底機制
            while (maze[player.y + dy][player.x + dx] !== 1) {
                player.x += dx;
                player.y += dy;
                maze[player.y][player.x] = 2; 
                moved = true;
            }

            if (moved) {
                draw();
                checkWin();
            }
        }

        function checkWin() {
            let hasUnpainted = false;
            for (let r = 0; r < mazeSize; r++) {
                if (maze[r].includes(0)) { 
                    hasUnpainted = true;
                    break;
                }
            }

            if (!hasUnpainted) {
                isGameOver = true;
                
                if (currentLevel >= maxLevels) {
                    messageDiv.innerText = '🎉 🥳 恭喜通關全部 1000 關！你太強了！';
                } else {
                    messageDiv.innerText = '👍 完美塗滿！準備進入下一關...';
                    currentLevel++;
                    // 延遲 1.2 秒後自動載入難度更高的下一關
                    setTimeout(startNewLevel, 1200);
                }
            }
        }

        // =================【事件綁定】=================
        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': move(0, -1); break;
                case 'ArrowDown': case 's': case 'S': move(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': move(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': move(1, 0); break;
            }
        });

        document.getElementById('btnUp').addEventListener('click', () => move(0, -1));
        document.getElementById('btnDown').addEventListener('click', () => move(0, 1));
        document.getElementById('btnLeft').addEventListener('click', () => move(-1, 0));
        document.getElementById('btnRight').addEventListener('click', () => move(1, 0));

        // 啟動第一關
        startNewLevel();
    </script>
</body>
</html>
