<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Paint 地獄難度版</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1e272e; /* 換個更硬核的深色背景 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation; 
        }
        .header-container {
            text-align: center;
            margin-bottom: 10px;
        }
        h1 {
            color: #d2dae2;
            margin: 0;
            font-size: 26px;
        }
        .level-badge {
            background-color: #ff3f34;
            color: white;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
            box-shadow: 0 0 10px rgba(255, 63, 52, 0.5);
        }
        canvas {
            border: 4px solid #4bcffa;
            border-radius: 10px;
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #message {
            margin-top: 8px;
            font-size: 20px;
            font-weight: bold;
            color: #0fbcf9;
            height: 28px;
        }

        /* 十字方向鍵佈局 */
        .dpad-container {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
            margin-top: 15px;
        }
        .dpad-btn {
            background-color: #4bcffa;
            color: #1e272e;
            border: none;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px #0fbcf9;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: transform 0.05s;
        }
        .dpad-btn:active {
            box-shadow: 0 0px #0fbcf9;
            transform: translateY(4px);
            background-color: #0fbcf9;
        }
        #btnUp    { grid-column: 2; grid-row: 1; }
        #btnLeft  { grid-column: 1; grid-row: 2; }
        #btnDown  { grid-column: 2; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Maze Paint 地獄難度</h1>
        <div class="level-badge" id="levelDisplay">關卡: 1 / 1000</div>
    </div>
    
    <canvas id="gameCanvas" width="390" height="390"></canvas>
    <div id="message"></div>

    <div class="dpad-container">
        <button id="btnUp" class="dpad-btn">▲</button>
        <button id="btnLeft" class="dpad-btn">◀</button>
        <button id="btnDown" class="dpad-btn">▼</button>
        <button id="btnRight" class="dpad-btn">▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const messageDiv = document.getElementById('message');
        const levelDisplay = document.getElementById('levelDisplay');

        let currentLevel = 1;
        const maxLevels = 1000;
        
        let maze = [];
        let mazeSize = 7; 
        let tileSize = 0; 
        let isGameOver = false;

        const player = { x: 1, y: 1, color: '#ff3f34' };

        function startNewLevel() {
            isGameOver = false;
            messageDiv.innerText = '';
            levelDisplay.innerText = `關卡: ${currentLevel} / ${maxLevels}`;

            // 尺寸成長速度加快，更快進入大迷宮
            mazeSize = 7 + Math.min(12, Math.floor((currentLevel - 1) / 3)) * 2;
            tileSize = canvas.width / mazeSize;

            maze = Array(mazeSize).fill().map(() => Array(mazeSize).fill(1));

            // 1. 標準 DFS 迷宮生成
            function carve(r, c) {
                maze[r][c] = 0; 
                const dirs = [[-2, 0], [2, 0], [0, -2], [0, 2]].sort(() => Math.random() - 0.5);

                for (let [dr, dc] of dirs) {
                    let nr = r + dr;
                    let nc = c + dc;
                    if (nr > 0 && nr < mazeSize - 1 && nc > 0 && nc < mazeSize - 1 && maze[nr][nc] === 1) {
                        maze[r + dr / 2][c + dc / 2] = 0; 
                        carve(nr, nc); 
                    }
                }
            }
            carve(1, 1);

            // 2. 核心改動：惡意破牆機制 (增加空地與迴圈)
            // 關卡越高，打破牆壁的機率越高，最高可達 45% 的牆壁被拆除
            let breakWallChance = Math.min(0.45, 0.05 + (currentLevel / 50) * 0.4); 
            
            for (let r = 1; r < mazeSize - 1; r++) {
                for (let c = 1; c < mazeSize - 1; c++) {
                    if (maze[r][c] === 1) {
                        // 為了確保迷宮依然「可解」，我們只打通兩邊是路、兩邊是牆的障礙物
                        // 這樣會形成四通八達的通道，而不是一整塊沒有牆壁無法停下的死區
                        let verticalPass = (maze[r-1][c] === 0 && maze[r+1][c] === 0 && maze[r][c-1] === 1 && maze[r][c+1] === 1);
                        let horizontalPass = (maze[r][c-1] === 0 && maze[r][c+1] === 0 && maze[r-1][c] === 1 && maze[r+1][c] === 1);
                        
                        if ((verticalPass || horizontalPass) && Math.random() < breakWallChance) {
                            maze[r][c] = 0; // 拆除牆壁，挖空空間
                        }
                    }
                }
            }

            player.x = 1;
            player.y = 1;
            maze[1][1] = 2;

            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let r = 0; r < mazeSize; r++) {
                for (let c = 0; c < mazeSize; c++) {
                    if (maze[r][c] === 1) {
                        ctx.fillStyle = '#1e272e'; // 牆壁顏色變深
                    } else if (maze[r][c] === 2) {
                        ctx.fillStyle = '#0fbcf9'; // 塗色變成亮藍色
                    } else {
                        ctx.fillStyle = '#d2dae2'; // 空白路徑
                    }
                    ctx.fillRect(c * tileSize, r * tileSize, Math.ceil(tileSize), Math.ceil(tileSize));
                    
                    if (maze[r][c] !== 1 && mazeSize < 20) {
                        ctx.strokeStyle = '#bdc3c7';
                        ctx.strokeRect(c * tileSize, r * tileSize, tileSize, tileSize);
                    }
                }
            }

            ctx.beginPath();
            ctx.arc(
                player.x * tileSize + tileSize / 2,
                player.y * tileSize + tileSize / 2,
                tileSize / 2.6, 
                0,
                Math.PI * 2
            );
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.closePath();
        }

        function move(dx, dy) {
            if (isGameOver) return;
            let moved = false;

            while (maze[player.y + dy][player.x + dx] !== 1) {
                player.x += dx;
                player.y += dy;
                maze[player.y][player.x] = 2; 
                moved = true;
            }

            if (moved) {
                draw();
                checkWin();
            }
        }

        function checkWin() {
            let hasUnpainted = false;
            for (let r = 0; r < mazeSize; r++) {
                if (maze[r].includes(0)) { 
                    hasUnpainted = true;
                    break;
                }
            }

            if (!hasUnpainted) {
                isGameOver = true;
                if (currentLevel >= maxLevels) {
                    messageDiv.innerText = '🏆 封神！1000關全破！';
                } else {
                    messageDiv.innerText = '🔥 漂亮！難度繼續提升...';
                    currentLevel++;
                    setTimeout(startNewLevel, 1000);
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': move(0, -1); break;
                case 'ArrowDown': case 's': case 'S': move(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': move(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': move(1, 0); break;
            }
        });

        document.getElementById('btnUp').addEventListener('click', () => move(0, -1));
        document.getElementById('btnDown').addEventListener('click', () => move(0, 1));
        document.getElementById('btnLeft').addEventListener('click', () => move(-1, 0));
        document.getElementById('btnRight').addEventListener('click', () => move(1, 0));

        startNewLevel();
    </script>
</body>
</html>
