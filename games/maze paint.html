<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專家級迷宮批次生成器</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        h1 { margin-bottom: 10px; }
        p { color: #bdc3c7; margin-bottom: 30px; }
        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px #c0392b;
            transition: transform 0.1s;
        }
        button:active {
            box-shadow: 0 0px #c0392b;
            transform: translateY(4px);
        }
        #status { margin-top: 20px; font-size: 18px; color: #2ecc71; }
    </style>
</head>
<body>

    <h1>100關專家級地圖生成器</h1>
    <p>點擊按鈕，自動生成並下載包含 100 張 25x25 地圖的 JSON 檔案。</p>

    <button id="generateBtn">生成並下載 levels.json</button>
    <div id="status"></div>

    <script>
        const btn = document.getElementById('generateBtn');
        const statusDiv = document.getElementById('status');

        function generateExpertMazes(count, size) {
            const mazes = [];
            
            for (let i = 0; i < count; i++) {
                // 初始化全牆壁地圖
                let maze = Array(size).fill().map(() => Array(size).fill(1));
                maze[1][1] = 0;
                let nodes = [[1, 1]];

                // 滑動式開路演算法 (保證可解且具備超長距離滑動)
                while(nodes.length > 0) {
                    let idx = nodes.length - 1; 
                    if (Math.random() < 0.2) idx = Math.floor(Math.random() * nodes.length);
                    
                    let [r, c] = nodes[idx];
                    let carved = false;
                    
                    let dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]].sort(() => Math.random() - 0.5);
                    
                    for (let [dr, dc] of dirs) {
                        let validLengths = [];
                        for (let len = 2; len < size - 1; len++) {
                            let endR = r + dr * len;
                            let endC = c + dc * len;
                            
                            if (endR <= 0 || endR >= size - 1 || endC <= 0 || endC >= size - 1) break;
                            
                            let isValid = true;
                            for (let step = 1; step <= len; step++) {
                                let pr = r + dr * step;
                                let pc = c + dc * step;
                                if (maze[pr][pc] === 0) { isValid = false; break; }
                                
                                if (dr === 0) {
                                    if (maze[pr-1][pc] === 0 || maze[pr+1][pc] === 0) { isValid = false; break; }
                                } else {
                                    if (maze[pr][pc-1] === 0 || maze[pr][pc+1] === 0) { isValid = false; break; }
                                }
                            }
                            
                            let nextR = r + dr * (len + 1);
                            let nextC = c + dc * (len + 1);
                            if (nextR >= 0 && nextR < size && nextC >= 0 && nextC < size) {
                                if (maze[nextR][nextC] === 0) isValid = false;
                            }
                            
                            if (isValid) {
                                validLengths.push(len);
                            } else {
                                break; 
                            }
                        }
                        
                        if (validLengths.length > 0) {
                            let chosenLen = validLengths[validLengths.length - 1];
                            if (Math.random() < 0.3) chosenLen = validLengths[Math.floor(Math.random() * validLengths.length)];
                            
                            for (let step = 1; step <= chosenLen; step++) {
                                maze[r + dr * step][c + dc * step] = 0;
                            }
                            nodes.push([r + dr * chosenLen, c + dc * chosenLen]);
                            carved = true;
                            break;
                        }
                    }
                    
                    if (!carved) {
                        nodes.splice(idx, 1);
                    }
                }
                mazes.push(maze);
            }
            return mazes;
        }

        btn.addEventListener('click', () => {
            statusDiv.innerText = '運算中，請稍候...';
            
            // 使用 setTimeout 讓 UI 有時間更新狀態
            setTimeout(() => {
                // 生成 100 張，大小為 25x25 的專家級地圖
                const levels = generateExpertMazes(100, 25);
                
                // 將資料轉換為 JSON 格式字串
                const jsonString = JSON.stringify(levels);
                
                // 建立 Blob 物件準備下載
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                // 建立隱藏的 a 標籤來觸發下載
                const a = document.createElement('a');
                a.href = url;
                a.download = 'expert_levels.json';
                document.body.appendChild(a);
                a.click();
                
                // 清理
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                statusDiv.innerText = '✅ 100 張地圖已成功生成並下載！';
            }, 100);
        });
    </script>
</body>
</html>
