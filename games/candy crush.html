<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>簡易版 Candy Crush (完整邏輯版)</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fce4ec;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overscroll-behavior: none; 
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 400px;
            margin-bottom: 10px;
        }

        .score-board {
            font-size: 24px;
            font-weight: bold;
            color: #d81b60;
        }

        .props-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
            max-width: 280px;
        }

        .prop-btn {
            background-color: #fff;
            border: 2px solid #f06292;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            color: #d81b60;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .prop-btn:active { transform: scale(0.95); }
        .prop-active {
            background-color: #ffb74d !important;
            border-color: #f57c00 !important;
            color: white;
            box-shadow: 0 0 10px #ffb74d;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            width: 400px; 
            height: 400px;
            background-color: rgba(255, 255, 255, 0.5);
            border: 4px solid #f06292;
            border-radius: 10px;
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: cursor 0.2s;
        }

        .grid div {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            box-sizing: border-box;
            border: 2px solid transparent;
            transition: transform 0.1s;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .grid div:hover {
            transform: scale(1.1);
            border-color: rgba(0,0,0,0.2);
        }

        @media (max-width: 450px) {
            .header { width: 320px; }
            .grid { width: 320px; height: 320px; }
            .grid div { width: 40px; height: 40px; }
            .props-container { max-width: 200px; }
            .prop-btn { font-size: 12px; padding: 4px 6px; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div class="score-board">分數: <span id="score">0</span></div>
            <div class="props-container">
                <button id="hammer-btn" class="prop-btn">🔨 敲擊</button>
                <button id="shuffle-btn" class="prop-btn">🔀 洗牌</button>
                <button id="striped-btn" class="prop-btn">🚀 十字</button>
                <button id="wrapped-btn" class="prop-btn">💣 範圍</button>
                <button id="color-btn" class="prop-btn">🌈 彩色</button>
            </div>
        </div>
        
        <div class="grid" id="game-grid"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.querySelector('.grid');
            const scoreDisplay = document.getElementById('score');
            const width = 8;
            const squares = [];
            let score = 0;

            const candyColors = ['#ef5350', '#ffee58', '#ffa726', '#ab47bc', '#66bb6a', '#29b6f6'];

            // 道具系統狀態管理
            let activeProp = null; 
            const propButtons = {
                'hammer': document.getElementById('hammer-btn'),
                'striped': document.getElementById('striped-btn'),
                'wrapped': document.getElementById('wrapped-btn'),
                'color': document.getElementById('color-btn')
            };

            function toggleProp(propName) {
                if (activeProp === propName) {
                    activeProp = null;
                    propButtons[propName].classList.remove('prop-active');
                    grid.style.cursor = 'default';
                } else {
                    Object.values(propButtons).forEach(btn => btn.classList.remove('prop-active'));
                    activeProp = propName;
                    propButtons[propName].classList.add('prop-active');
                    grid.style.cursor = 'crosshair';
                }
            }

            propButtons['hammer'].addEventListener('click', () => toggleProp('hammer'));
            propButtons['striped'].addEventListener('click', () => toggleProp('striped'));
            propButtons['wrapped'].addEventListener('click', () => toggleProp('wrapped'));
            propButtons['color'].addEventListener('click', () => toggleProp('color'));

            document.getElementById('shuffle-btn').addEventListener('click', () => {
                let currentColors = squares.map(sq => sq.style.backgroundColor);
                currentColors.sort(() => Math.random() - 0.5);
                squares.forEach((sq, i) => sq.style.backgroundColor = currentColors[i]);
                activeProp = null;
                Object.values(propButtons).forEach(btn => btn.classList.remove('prop-active'));
                grid.style.cursor = 'default';
            });

            // 建立棋盤
            function createBoard() {
                for (let i = 0; i < width * width; i++) {
                    const square = document.createElement('div');
                    square.setAttribute('draggable', true);
                    square.setAttribute('id', i);
                    let randomColor = Math.floor(Math.random() * candyColors.length);
                    square.style.backgroundColor = candyColors[randomColor];
                    
                    square.addEventListener('click', function() {
                        if (!activeProp) return; 

                        const id = parseInt(this.id);
                        const row = Math.floor(id / width);
                        const col = id % width;
                        const targetColor = this.style.backgroundColor;

                        if (activeProp === 'hammer') {
                            this.style.backgroundColor = '';
                            score += 5;
                        } 
                        else if (activeProp === 'striped') {
                            squares.forEach((sq, index) => {
                                if (Math.floor(index / width) === row || index % width === col) {
                                    sq.style.backgroundColor = '';
                                    score += 2;
                                }
                            });
                        }
                        else if (activeProp === 'wrapped') {
                            for (let r = row - 1; r <= row + 1; r++) {
                                for (let c = col - 1; c <= col + 1; c++) {
                                    if (r >= 0 && r < width && c >= 0 && c < width) {
                                        let targetId = r * width + c;
                                        squares[targetId].style.backgroundColor = '';
                                        score += 3;
                                    }
                                }
                            }
                        }
                        else if (activeProp === 'color') {
                            if (targetColor !== '') {
                                squares.forEach(sq => {
                                    if (sq.style.backgroundColor === targetColor) {
                                        sq.style.backgroundColor = '';
                                        score += 5;
                                    }
                                });
                            }
                        }

                        scoreDisplay.innerHTML = score;
                        propButtons[activeProp].classList.remove('prop-active');
                        activeProp = null;
                        grid.style.cursor = 'default';
                    });

                    grid.appendChild(square);
                    squares.push(square);
                }
            }
            createBoard();

            // 拖曳與交換變數
            let colorBeingDragged, colorBeingReplaced;
            let squareIdBeingDragged, squareIdBeingReplaced;

            squares.forEach(square => square.addEventListener('dragstart', dragStart));
            squares.forEach(square => square.addEventListener('dragend', dragEnd));
            squares.forEach(square => square.addEventListener('dragover', e => e.preventDefault()));
            squares.forEach(square => square.addEventListener('dragenter', e => e.preventDefault()));
            squares.forEach(square => square.addEventListener('drop', dragDrop));

            function dragStart() {
                if (activeProp) return;
                colorBeingDragged = this.style.backgroundColor;
                squareIdBeingDragged = parseInt(this.id);
            }

            function dragDrop() {
                if (activeProp) return;
                colorBeingReplaced = this.style.backgroundColor;
                squareIdBeingReplaced = parseInt(this.id);
                squares[squareIdBeingDragged].style.backgroundColor = colorBeingReplaced;
                squares[squareIdBeingReplaced].style.backgroundColor = colorBeingDragged;
            }

            function dragEnd() {
                if (activeProp) return;
                validateMove();
            }

            // 觸控邏輯
            let touchStartX = 0, touchStartY = 0;
            squares.forEach(square => square.addEventListener('touchstart', handleTouchStart, {passive: false}));
            squares.forEach(square => square.addEventListener('touchend', handleTouchEnd));

            function handleTouchStart(e) {
                if (activeProp) return;
                touchStartX = e.changedTouches[0].clientX;
                touchStartY = e.changedTouches[0].clientY;
                squareIdBeingDragged = parseInt(this.id);
                colorBeingDragged = this.style.backgroundColor;
            }

            function handleTouchEnd(e) {
                if (activeProp || squareIdBeingDragged === null) return;
                let diffX = e.changedTouches[0].clientX - touchStartX;
                let diffY = e.changedTouches[0].clientY - touchStartY;

                if (Math.abs(diffX) < 20 && Math.abs(diffY) < 20) return;

                if (Math.abs(diffX) > Math.abs(diffY)) {
                    squareIdBeingReplaced = diffX > 0 ? squareIdBeingDragged + 1 : squareIdBeingDragged - 1; 
                } else {
                    squareIdBeingReplaced = diffY > 0 ? squareIdBeingDragged + width : squareIdBeingDragged - width; 
                }

                if ((squareIdBeingDragged % width === width - 1 && squareIdBeingReplaced === squareIdBeingDragged + 1) ||
                    (squareIdBeingDragged % width === 0 && squareIdBeingReplaced === squareIdBeingDragged - 1) ||
                    squareIdBeingReplaced < 0 || squareIdBeingReplaced >= width * width) return;

                colorBeingReplaced = squares[squareIdBeingReplaced].style.backgroundColor;
                squares[squareIdBeingDragged].style.backgroundColor = colorBeingReplaced;
                squares[squareIdBeingReplaced].style.backgroundColor = colorBeingDragged;
                
                validateMove();
            }

            // 【新增】檢查盤面是否產生任何連線的函數
            function isMatchFormed() {
                // 檢查橫向
                for (let i = 0; i < 62; i++) {
                    let rowOfThree = [i, i + 1, i + 2];
                    let decidedColor = squares[i].style.backgroundColor;
                    if ([6, 7, 14, 15, 22, 23, 30, 31, 38, 39, 46, 47, 54, 55].includes(i)) continue;
                    if (decidedColor !== '' && rowOfThree.every(index => squares[index].style.backgroundColor === decidedColor)) {
                        return true;
                    }
                }
                // 檢查直向
                for (let i = 0; i < 48; i++) {
                    let columnOfThree = [i, i + width, i + width * 2];
                    let decidedColor = squares[i].style.backgroundColor;
                    if (decidedColor !== '' && columnOfThree.every(index => squares[index].style.backgroundColor === decidedColor)) {
                        return true;
                    }
                }
                return false; // 都沒有連線就回傳 false
            }

            // 【修改】驗證移動邏輯
            function validateMove() {
                let validMoves = [
                    squareIdBeingDragged - 1, squareIdBeingDragged - width,
                    squareIdBeingDragged + 1, squareIdBeingDragged + width
                ];
                let isAdjacent = validMoves.includes(squareIdBeingReplaced);

                if (squareIdBeingReplaced !== null && isAdjacent) {
                    // 交換後，立刻用 isMatchFormed() 判定是否有消除
                    let hasMatch = isMatchFormed();
                    
                    if (hasMatch) {
                        // 有成功連線，放行
                        squareIdBeingReplaced = null;
                    } else {
                        // 雖然在隔壁，但是沒有產生連線 -> 退回顏色！
                        squares[squareIdBeingReplaced].style.backgroundColor = colorBeingReplaced;
                        squares[squareIdBeingDragged].style.backgroundColor = colorBeingDragged;
                    }
                } else if (squareIdBeingReplaced !== null && !isAdjacent) {
                    // 根本不相鄰（例如拖到太遠的格子） -> 退回顏色
                    squares[squareIdBeingReplaced].style.backgroundColor = colorBeingReplaced;
                    squares[squareIdBeingDragged].style.backgroundColor = colorBeingDragged;
                }
            }

            // 消除與掉落邏輯
            function checkRowForThree() {
                for (let i = 0; i < 62; i++) {
                    let rowOfThree = [i, i + 1, i + 2];
                    let decidedColor = squares[i].style.backgroundColor;
                    if ([6, 7, 14, 15, 22, 23, 30, 31, 38, 39, 46, 47, 54, 55].includes(i)) continue;

                    if (decidedColor !== '' && rowOfThree.every(index => squares[index].style.backgroundColor === decidedColor)) {
                        score += 3;
                        scoreDisplay.innerHTML = score;
                        rowOfThree.forEach(index => squares[index].style.backgroundColor = '');
                    }
                }
            }

            function checkColumnForThree() {
                for (let i = 0; i < 48; i++) {
                    let columnOfThree = [i, i + width, i + width * 2];
                    let decidedColor = squares[i].style.backgroundColor;

                    if (decidedColor !== '' && columnOfThree.every(index => squares[index].style.backgroundColor === decidedColor)) {
                        score += 3;
                        scoreDisplay.innerHTML = score;
                        columnOfThree.forEach(index => squares[index].style.backgroundColor = '');
                    }
                }
            }

            function moveDown() {
                for (let i = 0; i < 56; i++) {
                    if (squares[i + width].style.backgroundColor === '') {
                        squares[i + width].style.backgroundColor = squares[i].style.backgroundColor;
                        squares[i].style.backgroundColor = '';
                    }
                    if (i < 8 && squares[i].style.backgroundColor === '') {
                        squares[i].style.backgroundColor = candyColors[Math.floor(Math.random() * candyColors.length)];
                    }
                }
            }

            window.setInterval(function() {
                checkRowForThree();
                checkColumnForThree();
                moveDown();
            }, 100);
        });
    </script>
</body>
</html>
