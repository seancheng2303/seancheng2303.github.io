<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>簡易版 Candy Crush (支援平板)</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fce4ec;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* 防止網頁在觸控時有奇怪的彈性滾動 */
            overscroll-behavior: none; 
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-board {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #d81b60;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            width: 400px; 
            height: 400px;
            background-color: rgba(255, 255, 255, 0.5);
            border: 4px solid #f06292;
            border-radius: 10px;
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .grid div {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            box-sizing: border-box;
            border: 2px solid transparent;
            transition: transform 0.1s;
            
            /* 【重要新增】防止平板滑動糖果時觸發網頁滾動或選取文字 */
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .grid div:hover {
            transform: scale(1.1);
            border-color: rgba(0,0,0,0.2);
        }

        /* 針對小螢幕平板/手機的響應式縮放 */
        @media (max-width: 450px) {
            .grid {
                width: 320px;
                height: 320px;
            }
            .grid div {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="score-board">分數: <span id="score">0</span></div>
        <div class="grid"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.querySelector('.grid');
            const scoreDisplay = document.getElementById('score');
            const width = 8;
            const squares = [];
            let score = 0;

            const candyColors = ['#ef5350', '#ffee58', '#ffa726', '#ab47bc', '#66bb6a', '#29b6f6'];

            // 1. 建立遊戲棋盤
            function createBoard() {
                for (let i = 0; i < width * width; i++) {
                    const square = document.createElement('div');
                    square.setAttribute('draggable', true);
                    square.setAttribute('id', i);
                    let randomColor = Math.floor(Math.random() * candyColors.length);
                    square.style.backgroundColor = candyColors[randomColor];
                    grid.appendChild(square);
                    squares.push(square);
                }
            }
            createBoard();

            let colorBeingDragged;
            let colorBeingReplaced;
            let squareIdBeingDragged;
            let squareIdBeingReplaced;

            // --- 滑鼠事件 (原本的) ---
            squares.forEach(square => square.addEventListener('dragstart', dragStart));
            squares.forEach(square => square.addEventListener('dragend', dragEnd));
            squares.forEach(square => square.addEventListener('dragover', e => e.preventDefault()));
            squares.forEach(square => square.addEventListener('dragenter', e => e.preventDefault()));
            squares.forEach(square => square.addEventListener('drop', dragDrop));

            function dragStart() {
                colorBeingDragged = this.style.backgroundColor;
                squareIdBeingDragged = parseInt(this.id);
            }

            function dragDrop() {
                colorBeingReplaced = this.style.backgroundColor;
                squareIdBeingReplaced = parseInt(this.id);
                squares[squareIdBeingDragged].style.backgroundColor = colorBeingReplaced;
                squares[squareIdBeingReplaced].style.backgroundColor = colorBeingDragged;
            }

            function dragEnd() {
                validateMove();
            }

            // --- 平板/手機觸控事件 (新增) ---
            let touchStartX = 0;
            let touchStartY = 0;

            squares.forEach(square => square.addEventListener('touchstart', handleTouchStart, {passive: false}));
            squares.forEach(square => square.addEventListener('touchend', handleTouchEnd));

            function handleTouchStart(e) {
                // 記錄手指按下的起始座標
                touchStartX = e.changedTouches[0].clientX;
                touchStartY = e.changedTouches[0].clientY;
                squareIdBeingDragged = parseInt(this.id);
                colorBeingDragged = this.style.backgroundColor;
            }

            function handleTouchEnd(e) {
                if (squareIdBeingDragged === null) return;

                // 記錄手指離開的座標
                let touchEndX = e.changedTouches[0].clientX;
                let touchEndY = e.changedTouches[0].clientY;

                let diffX = touchEndX - touchStartX;
                let diffY = touchEndY - touchStartY;

                // 防呆：如果滑動距離太短，視為誤觸，不予理會
                if (Math.abs(diffX) < 20 && Math.abs(diffY) < 20) return;

                // 判斷是橫向還是直向滑動
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    // 橫向滑動
                    if (diffX > 0) squareIdBeingReplaced = squareIdBeingDragged + 1; // 右
                    else squareIdBeingReplaced = squareIdBeingDragged - 1; // 左
                } else {
                    // 直向滑動
                    if (diffY > 0) squareIdBeingReplaced = squareIdBeingDragged + width; // 下
                    else squareIdBeingReplaced = squareIdBeingDragged - width; // 上
                }

                // 防止在左右邊界產生不合理的跨列交換
                const isRightEdge = squareIdBeingDragged % width === width - 1;
                const isLeftEdge = squareIdBeingDragged % width === 0;

                if ((isRightEdge && squareIdBeingReplaced === squareIdBeingDragged + 1) ||
                    (isLeftEdge && squareIdBeingReplaced === squareIdBeingDragged - 1) ||
                    squareIdBeingReplaced < 0 || squareIdBeingReplaced >= width * width) {
                    return; // 越界，不執行
                }

                // 執行交換
                colorBeingReplaced = squares[squareIdBeingReplaced].style.backgroundColor;
                squares[squareIdBeingDragged].style.backgroundColor = colorBeingReplaced;
                squares[squareIdBeingReplaced].style.backgroundColor = colorBeingDragged;

                validateMove();
            }

            // --- 統整的驗證交換邏輯 ---
            function validateMove() {
                let validMoves = [
                    squareIdBeingDragged - 1,
                    squareIdBeingDragged - width,
                    squareIdBeingDragged + 1,
                    squareIdBeingDragged + width
                ];
                let validMove = validMoves.includes(squareIdBeingReplaced);

                if (squareIdBeingReplaced !== null && validMove) {
                    squareIdBeingReplaced = null;
                } else if (squareIdBeingReplaced !== null && !validMove) {
                    squares[squareIdBeingReplaced].style.backgroundColor = colorBeingReplaced;
                    squares[squareIdBeingDragged].style.backgroundColor = colorBeingDragged;
                }
            }

            // 3. 檢查消除邏輯
            function checkRowForThree() {
                for (let i = 0; i < 62; i++) {
                    let rowOfThree = [i, i + 1, i + 2];
                    let decidedColor = squares[i].style.backgroundColor;
                    const isBlank = squares[i].style.backgroundColor === '';
                    
                    const notValid = [6, 7, 14, 15, 22, 23, 30, 31, 38, 39, 46, 47, 54, 55];
                    if (notValid.includes(i)) continue;

                    if (rowOfThree.every(index => squares[index].style.backgroundColor === decidedColor && !isBlank)) {
                        score += 3;
                        scoreDisplay.innerHTML = score;
                        rowOfThree.forEach(index => {
                            squares[index].style.backgroundColor = '';
                        });
                    }
                }
            }

            function checkColumnForThree() {
                for (let i = 0; i < 48; i++) {
                    let columnOfThree = [i, i + width, i + width * 2];
                    let decidedColor = squares[i].style.backgroundColor;
                    const isBlank = squares[i].style.backgroundColor === '';

                    if (columnOfThree.every(index => squares[index].style.backgroundColor === decidedColor && !isBlank)) {
                        score += 3;
                        scoreDisplay.innerHTML = score;
                        columnOfThree.forEach(index => {
                            squares[index].style.backgroundColor = '';
                        });
                    }
                }
            }

            // 4. 讓糖果掉落補充空位
            function moveDown() {
                for (let i = 0; i < 56; i++) {
                    if (squares[i + width].style.backgroundColor === '') {
                        squares[i + width].style.backgroundColor = squares[i].style.backgroundColor;
                        squares[i].style.backgroundColor = '';
                    }
                    const firstRow = [0, 1, 2, 3, 4, 5, 6, 7];
                    const isFirstRow = firstRow.includes(i);
                    if (isFirstRow && squares[i].style.backgroundColor === '') {
                        let randomColor = Math.floor(Math.random() * candyColors.length);
                        squares[i].style.backgroundColor = candyColors[randomColor];
                    }
                }
            }

            window.setInterval(function() {
                checkRowForThree();
                checkColumnForThree();
                moveDown();
            }, 100);
        });
    </script>
</body>
</html>
