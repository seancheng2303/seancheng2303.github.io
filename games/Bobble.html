<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 泡泡龍基礎版</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
        }
        canvas {
            background-color: #ecf0f1;
            border: 4px solid #34495e;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 遊戲設定
    const bubbleRadius = 15;
    const colors = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#9b59b6'];
    
    // 發射器設定
    const shooter = {
        x: canvas.width / 2,
        y: canvas.height - 30,
        angle: 0
    };

    // 儲存發射出去的泡泡和上方的目標泡泡
    let projectiles = [];
    let gridBubbles = [];

    // 滑鼠游標位置
    let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

    // 監聽滑鼠移動來瞄準
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
        
        // 計算發射器的角度
        const dx = mouse.x - shooter.x;
        const dy = mouse.y - shooter.y;
        shooter.angle = Math.atan2(dy, dx);
    });

    // 點擊發射泡泡
    canvas.addEventListener('click', () => {
        const speed = 8;
        const velocity = {
            x: Math.cos(shooter.angle) * speed,
            y: Math.sin(shooter.angle) * speed
        };
        
        // 隨機生成一個顏色的泡泡發射
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        
        projectiles.push({
            x: shooter.x,
            y: shooter.y,
            velocity: velocity,
            color: randomColor
        });
    });

    // 產生一開始的目標泡泡網格
    function initGrid() {
        for (let row = 0; row < 5; row++) {
            for (let col = 0; col < 12; col++) {
                // 簡單的交錯排列計算
                let x = col * (bubbleRadius * 2 + 2) + bubbleRadius + 15;
                if (row % 2 !== 0) x += bubbleRadius; 
                let y = row * (bubbleRadius * 2 - 4) + bubbleRadius + 20;
                
                gridBubbles.push({
                    x: x,
                    y: y,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }
    }

    // 繪製泡泡的函數
    function drawBubble(x, y, color) {
        ctx.beginPath();
        ctx.arc(x, y, bubbleRadius, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.closePath();
    }

    // 遊戲主迴圈
    function animate() {
        requestAnimationFrame(animate);
        
        // 清除畫布
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 畫出上方的泡泡網格
        gridBubbles.forEach(bubble => {
            drawBubble(bubble.x, bubble.y, bubble.color);
        });

        // 2. 更新與畫出發射出去的泡泡
        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            p.x += p.velocity.x;
            p.y += p.velocity.y;

            // 邊界反彈 (左右牆壁)
            if (p.x - bubbleRadius < 0 || p.x + bubbleRadius > canvas.width) {
                p.velocity.x *= -1;
            }

            drawBubble(p.x, p.y, p.color);

            // 簡單的邊界移除 (打到最頂端時消失，這裡可以改成固定在網格上)
            if (p.y + bubbleRadius < 0) {
                projectiles.splice(i, 1);
            }
        }

        // 3. 畫出發射器 (瞄準線)
        ctx.beginPath();
        ctx.moveTo(shooter.x, shooter.y);
        ctx.lineTo(
            shooter.x + Math.cos(shooter.angle) * 40,
            shooter.y + Math.sin(shooter.angle) * 40
        );
        ctx.strokeStyle = '#34495e';
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.closePath();

        // 畫出發射器底座
        ctx.beginPath();
        ctx.arc(shooter.x, shooter.y, 20, 0, Math.PI * 2);
        ctx.fillStyle = '#7f8c8d';
        ctx.fill();
        ctx.closePath();
    }

    // 初始化並啟動遊戲
    initGrid();
    animate();
</script>

</body>
</html>
