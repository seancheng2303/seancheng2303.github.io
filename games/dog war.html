<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狗狗大戰爭 (Battle Dogs) - Prototype</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #f0f0f0; font-family: sans-serif; text-align: center; }
        #game-container { position: relative; width: 800px; height: 400px; margin: 0 auto; border: 2px solid #333; background-color: #87CEEB; overflow: hidden; }
        canvas { display: block; }
        .ui-bar { width: 800px; margin: 10px auto; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; border: 2px solid #333; border-radius: 5px; background-color: #fff; font-weight: bold; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #wallet-info { font-size: 18px; font-weight: bold; background: #FFD700; padding: 5px 15px; border-radius: 20px; border: 2px solid #B8860B; }
        
        /* 動畫特效 */
        @keyframes laser-fire {
            0% { background-color: rgba(255, 0, 0, 0); }
            50% { background-color: rgba(255, 255, 0, 0.8); }
            100% { background-color: rgba(255, 0, 0, 0); }
        }
        .laser-active { animation: laser-fire 0.5s ease-out; }
    </style>
</head>
<body>

    <h1>🐾 狗狗大戰爭 - 核心戰鬥測試 🐾</h1>
    
    <div class="ui-bar">
        <div id="wallet-info">💰 0 / 100 (Lv.1)</div>
        <button id="btn-upgrade-wallet">🔼 升級錢包 (Cost: 150)</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <div class="ui-bar" style="justify-content: flex-start; gap: 10px;">
        <button id="btn-spawn-doge">🐶 砲灰狗 ($50)</button>
        <button id="btn-spawn-sniper">🐕 狙擊狗 ($200)</button>
        <button id="btn-spawn-titan">🦍 巨神狗 ($500)</button>
        <div style="flex-grow: 1;"></div>
        <button id="btn-laser" style="background-color: #ff4c4c; color: white;">⚡ 雷射砲 (0%)</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // === 遊戲系統狀態 ===
    const game = {
        money: 0,
        maxMoney: 100,
        walletLevel: 1,
        moneyRate: 0.5, // 每幀增加的錢
        laserCharge: 0,
        laserMax: 1000,
        isGameOver: false
    };

    const units = []; // 場上所有單位
    let lastTime = 0;

    // === 基地設定 ===
    const bases = {
        player: { x: 50, y: 300, hp: 1000, maxHp: 1000, width: 60, height: 80, color: 'blue', isPlayer: true },
        enemy:  { x: 700, y: 300, hp: 1500, maxHp: 1500, width: 60, height: 80, color: 'darkred', isPlayer: false }
    };

    // === 角色圖鑑資料 ===
    const UNIT_DATA = {
        doge:   { cost: 50, hp: 100, atk: 15, range: 30, speed: 1.5, cd: 2000, color: 'lightblue', width: 20, height: 20 },
        sniper: { cost: 200, hp: 150, atk: 40, range: 150, speed: 1.0, cd: 5000, color: 'teal', width: 25, height: 30 },
        titan:  { cost: 500, hp: 800, atk: 100, range: 40, speed: 0.6, cd: 15000, color: 'navy', width: 40, height: 50 },
        // 敵軍
        enemy1: { hp: 120, atk: 10, range: 30, speed: -0.8, color: 'red', width: 25, height: 25 },
        enemyBoss:{ hp: 1000, atk: 50, range: 40, speed: -0.4, color: 'purple', width: 50, height: 60 }
    };

    // === 實體類別 ===
    class Unit {
        constructor(x, y, data, isPlayer) {
            this.x = x;
            this.y = y - data.height;
            this.hp = data.hp;
            this.maxHp = data.hp;
            this.atk = data.atk;
            this.range = data.range;
            this.speed = data.speed;
            this.width = data.width;
            this.height = data.height;
            this.color = data.color;
            this.isPlayer = isPlayer;
            this.actionTimer = 0;
            this.state = 'move'; // move 或 attack
        }

        draw(ctx) {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
            // 血條
            ctx.fillStyle = 'red';
            ctx.fillRect(this.x, this.y - 10, this.width, 5);
            ctx.fillStyle = 'lightgreen';
            ctx.fillRect(this.x, this.y - 10, this.width * (this.hp / this.maxHp), 5);
        }

        update(deltaTime) {
            if (this.hp <= 0) return;

            // 尋找目標
            let target = this.findTarget();

            if (target) {
                // 進入攻擊狀態
                this.state = 'attack';
                this.actionTimer += deltaTime;
                if (this.actionTimer >= 1000) { // 每秒攻擊一次
                    target.hp -= this.atk;
                    this.actionTimer = 0;
                }
            } else {
                // 移動
                this.state = 'move';
                this.x += this.speed;
                this.actionTimer = 0; // 重置攻擊計時
            }
        }

        findTarget() {
            // 檢查是否碰到敵方主堡
            const enemyBase = this.isPlayer ? bases.enemy : bases.player;
            const distToBase = this.isPlayer ? (enemyBase.x - (this.x + this.width)) : (this.x - (enemyBase.x + enemyBase.width));
            if (distToBase <= this.range) return enemyBase;

            // 檢查敵方單位
            let closest = null;
            let minDist = Infinity;

            for (let u of units) {
                if (u.hp <= 0 || u.isPlayer === this.isPlayer) continue;
                
                let dist = this.isPlayer ? (u.x - (this.x + this.width)) : (this.x - (u.x + u.width));
                if (dist <= this.range && dist >= 0) {
                    if (dist < minDist) {
                        minDist = dist;
                        closest = u;
                    }
                }
            }
            return closest;
        }
    }

    // === UI 更新與互動 ===
    const uiMoney = document.getElementById('wallet-info');
    const btnWallet = document.getElementById('btn-upgrade-wallet');
    const btnLaser = document.getElementById('btn-laser');

    function updateUI() {
        uiMoney.innerText = `💰 ${Math.floor(game.money)} / ${game.maxMoney} (Lv.${game.walletLevel})`;
        
        // 錢包升級按鈕
        let upgradeCost = game.walletLevel * 150;
        btnWallet.innerText = `🔼 升級錢包 (Cost: ${upgradeCost})`;
        btnWallet.disabled = game.money < upgradeCost;

        // 產兵按鈕狀態
        document.getElementById('btn-spawn-doge').disabled = game.money < UNIT_DATA.doge.cost;
        document.getElementById('btn-spawn-sniper').disabled = game.money < UNIT_DATA.sniper.cost;
        document.getElementById('btn-spawn-titan').disabled = game.money < UNIT_DATA.titan.cost;

        // 雷射按鈕
        let laserPercent = Math.floor((game.laserCharge / game.laserMax) * 100);
        btnLaser.innerText = laserPercent >= 100 ? '⚡ 發射雷射！' : `⚡ 雷射砲 (${laserPercent}%)`;
        btnLaser.disabled = laserPercent < 100;
    }

    // 事件監聽器
    btnWallet.onclick = () => {
        let cost = game.walletLevel * 150;
        if (game.money >= cost) {
            game.money -= cost;
            game.walletLevel++;
            game.maxMoney += 150;
            game.moneyRate += 0.2;
        }
    };

    function spawnUnit(typeData, isPlayer) {
        if (isPlayer && game.money >= typeData.cost) {
            game.money -= typeData.cost;
            units.push(new Unit(bases.player.x + bases.player.width, 300, typeData, true));
        } else if (!isPlayer) {
            units.push(new Unit(bases.enemy.x - typeData.width, 300, typeData, false));
        }
    }

    document.getElementById('btn-spawn-doge').onclick = () => spawnUnit(UNIT_DATA.doge, true);
    document.getElementById('btn-spawn-sniper').onclick = () => spawnUnit(UNIT_DATA.sniper, true);
    document.getElementById('btn-spawn-titan').onclick = () => spawnUnit(UNIT_DATA.titan, true);

    btnLaser.onclick = () => {
        if (game.laserCharge >= game.laserMax) {
            game.laserCharge = 0;
            document.getElementById('game-container').classList.add('laser-active');
            setTimeout(() => document.getElementById('game-container').classList.remove('laser-active'), 500);
            
            // 雷射傷害與強制擊退 (打斷與保命核心)
            units.forEach(u => {
                if (!u.isPlayer) {
                    u.hp -= 300;
                    u.x += 100; // 強制往右擊退
                }
            });
        }
    };

    // === 敵軍自動生成 AI (極簡版) ===
    let enemyTimer = 0;
    function enemyAI(deltaTime) {
        enemyTimer += deltaTime;
        if (enemyTimer > 3000) {
            spawnUnit(UNIT_DATA.enemy1, false);
            enemyTimer = 0;
            // 偶爾生成 Boss
            if (Math.random() < 0.2) spawnUnit(UNIT_DATA.enemyBoss, false);
        }
    }

    // === 繪製基地 ===
    function drawBase(base) {
        ctx.fillStyle = base.color;
        ctx.fillRect(base.x, base.y - base.height, base.width, base.height);
        // 血條
        ctx.fillStyle = 'red';
        ctx.fillRect(base.x, base.y - base.height - 15, base.width, 10);
        ctx.fillStyle = 'lightgreen';
        ctx.fillRect(base.x, base.y - base.height - 15, base.width * (base.hp / base.maxHp), 10);
    }

    // === 主遊戲迴圈 ===
    function gameLoop(timestamp) {
        if (game.isGameOver) return;
        const deltaTime = timestamp - lastTime;
        lastTime = timestamp;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 系統資源更新
        game.money = Math.min(game.money + (game.moneyRate * (deltaTime / 16)), game.maxMoney);
        game.laserCharge = Math.min(game.laserCharge + (1 * (deltaTime / 16)), game.laserMax);

        enemyAI(deltaTime);

        // 更新與清理單位
        for (let i = units.length - 1; i >= 0; i--) {
            units[i].update(deltaTime);
            if (units[i].hp <= 0) units.splice(i, 1);
        }

        // 繪製
        drawBase(bases.player);
        drawBase(bases.enemy);
        units.forEach(u => u.draw(ctx));

        updateUI();

        // 勝負判斷
        if (bases.player.hp <= 0) {
            alert("遊戲結束！你的主堡被摧毀了！");
            game.isGameOver = true;
        } else if (bases.enemy.hp <= 0) {
            alert("勝利！你推平了敵軍主堡！");
            game.isGameOver = true;
        }

        requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame((time) => {
        lastTime = time;
        gameLoop(time);
    });
</script>
</body>
</html>
