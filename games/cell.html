<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>免疫防線：細胞大戰病毒 (Iframe 完美填滿版)</title>
    <style>
        * { box-sizing: border-box; }
        /* 關鍵修改：確保 html 與 body 完全填滿 iframe 容器並鎖死捲軸 */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #08080c; color: white; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }
        
        canvas { background-color: #0b0b12; display: none; vertical-align: bottom; }
        
        /* 角色選擇介面 */
        #charSelectScreen {
            position: absolute; display: flex; flex-direction: column; align-items: center;
            justify-content: center; background: #0f0f1a; width: 100%; height: 100%; z-index: 30;
            overflow-y: auto; padding: 20px;
        }
        #charSelectScreen h2 {
            font-size: 26px; text-align: center; margin-top: 0; margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0,173,181,0.5); color: #00adb5;
        }
        .card-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; max-width: 900px; width: 100%; }
        .char-card {
            background: #161626; border: 2px solid #333; border-radius: 12px; padding: 15px;
            width: 250px; text-align: center; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center;
        }
        .char-card:hover { border-color: #00adb5; transform: scale(1.03); }
        .char-info { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .char-card h3 { margin: 5px 0; font-size: 18px; }
        .char-card p { font-size: 13px; color: #aaa; line-height: 1.4; margin: 4px 0; }
        .char-card img {
            width: 80px; height: 80px; object-fit: contain;
            margin: 8px auto 4px; display: block;
            border-radius: 50%; padding: 6px;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            filter: drop-shadow(0 0 8px rgba(0,173,181,0.4));
            transition: transform 0.3s, filter 0.3s;
        }
        .char-card:hover img {
            transform: scale(1.12);
            filter: drop-shadow(0 0 14px rgba(0,173,181,0.7));
        }
        
        /* 遊戲內 UI */
        #ui {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: none; justify-content: space-between; align-items: center;
            font-size: 16px; font-weight: bold; pointer-events: none;
            text-shadow: 0 0 8px #00adb5; z-index: 10;
        }
        .bar-container {
            position: absolute; left: 10px; right: 10px; height: 6px; border-radius: 3px; overflow: hidden; display: none;
        }
        #xpContainer { top: 40px; background: rgba(255,255,255,0.1); }
        #xpBar { width: 0%; height: 100%; background: #00ff66; transition: 0.1s; }
        #hpContainer { top: 50px; background: rgba(255,0,0,0.2); }
        #hpBar { width: 100%; height: 100%; background: #ff2e63; transition: 0.1s; }
        
        #upgradeMenu {
            display: none; position: absolute; background: rgba(15, 15, 28, 0.96); 
            width: 85%; max-width: 420px; border: 2px solid #00adb5; padding: 20px; 
            border-radius: 15px; text-align: center; box-shadow: 0 0 40px rgba(0, 173, 181, 0.5); z-index: 20;
        }
        #gameOverScreen {
            display: none; position: absolute; background: rgba(15, 15, 28, 0.96); 
            width: 85%; max-width: 420px; border: 2px solid #ff2e63; padding: 25px; 
            border-radius: 15px; text-align: center; box-shadow: 0 0 40px rgba(255, 46, 99, 0.5); z-index: 40;
        }
        .btn {
            background: linear-gradient(135deg, #00adb5, #007a80); color: white; border: none; 
            padding: 14px; margin: 10px 0; font-size: 15px; cursor: pointer; border-radius: 10px;
            font-weight: bold; width: 100%; transition: 0.2s; box-shadow: 0 4px #005a60;
        }

        /* 手機介面與窄螢幕適配 */
        @media (max-width: 820px) {
            #charSelectScreen {
                justify-content: flex-start;
                padding: 30px 15px;
            }
            #charSelectScreen h2 {
                font-size: 20px;
                margin-bottom: 15px;
            }
            .card-container {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }
            .char-card {
                width: 100%;
                max-width: 360px;
                flex-direction: row;
                text-align: left;
                padding: 12px;
                gap: 15px;
            }
            .char-card img {
                width: 65px;
                height: 65px;
                margin: 0;
                flex-shrink: 0;
            }
            .char-info {
                align-items: flex-start;
            }
            .char-card h3 {
                font-size: 16px;
                margin: 0 0 2px 0;
            }
            .char-card p {
                font-size: 12px;
                margin: 1px 0;
            }
            .char-card p br {
                display: none;
            }
        }

        @media (max-width: 600px) {
            #ui {
                font-size: 14px;
                top: 8px;
                left: 8px;
                right: 8px;
            }
            .bar-container {
                left: 8px;
                right: 8px;
                height: 5px;
            }
            #xpContainer { top: 32px; }
            #hpContainer { top: 40px; }

            #upgradeMenu, #gameOverScreen {
                width: 90%;
                padding: 15px;
            }
            #upgradeMenu h3 {
                font-size: 16px;
                margin-bottom: 10px;
            }
            .btn {
                padding: 10px;
                margin: 6px 0;
                font-size: 13px;
                border-radius: 8px;
            }
        }
    </style>
</head>
<body>

<div id="charSelectScreen">
    <h2>🧬 選擇你的免疫細胞</h2>
    <div class="card-container">
        <div class="char-card" onclick="selectCharacter('neutrophil')">
            <img src="../assets/cell/cell_neutrophil.png" alt="嗜中性球">
            <div class="char-info">
                <h3 style="color: #00adb5;">🎯 嗜中性球</h3>
                <p style="color: #00ff66; font-weight:bold;">定位：平衡遠程</p>
                <p>武器：活性氧彈 (高頻單體)<br>特性：擊殺病毒時有 15% 機率直接吞噬，額外獲得經驗值。</p>
            </div>
        </div>
        <div class="char-card" onclick="selectCharacter('macrophage')">
            <img src="../assets/cell/cell_macrophage.png" alt="巨噬細胞">
            <div class="char-info">
                <h3 style="color: #ff9f43;">🛡️ 巨噬細胞</h3>
                <p style="color: #00ff66; font-weight:bold;">定位：陣地坦克</p>
                <p>武器：偽足掃擊 (周圍群攻)<br>特性：體型較大、血量極高 (+50)，且擁有更大的經驗吸收範圍。</p>
            </div>
        </div>
        <div class="char-card" onclick="selectCharacter('killerT')">
            <img src="../assets/cell/cell_killer_t.png" alt="殺手T細胞">
            <div class="char-info">
                <h3 style="color: #ff2e63;">⚡ 殺手 T 細胞</h3>
                <p style="color: #00ff66; font-weight:bold;">定位：高爆刺客</p>
                <p>武器：穿孔素穿刺 (直線貫穿)<br>特性：移動速度極快 (+20%)，對低血量病毒造成雙倍傷害。</p>
            </div>
        </div>
    </div>
</div>

<div id="ui">
    <div>⏱️ <span id="gameTime">00:00</span></div>
    <div>LV <span id="level">1</span> (<span id="charName">細胞</span>)</div>
    <div>💀 <span id="kills">0</span></div>
</div>
<div id="xpContainer" class="bar-container"><div id="xpBar"></div></div>
<div id="hpContainer" class="bar-container"><div id="hpBar"></div></div>

<canvas id="gameCanvas"></canvas>

<div id="upgradeMenu">
    <h3 style="color: #00adb5; margin-top: 0;" id="upgradeTitle">🧬 免疫基因突變</h3>
    <div id="options"></div>
</div>

<div id="gameOverScreen">
    <h2 style="color: #ff2e63; margin-top: 0; text-shadow: 0 0 10px rgba(255,46,99,0.5);">💀 防線全面失守！</h2>
    <p id="gameOverStats" style="font-size: 15px; margin: 15px 0; line-height: 1.6; color: #eee;"></p>
    <button class="btn" onclick="restartGame()" style="background: linear-gradient(135deg, #ff2e63, #c70039); box-shadow: 0 4px #900020; margin-top: 15px;">🔄 重新開始</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let startTime, elapsedTime = 0, isPaused = false, kills = 0, gameStarted = false;
let bullets = [], enemyBullets = [], enemies = [], xps = [], acids = [];
let laserTimer = 0, isLaserFiring = false, laserAngle = 0, shieldAngle = 0, freezeTimer = 0, acidTimer = 0;

// === 圖片資產預載管理 ===
const assets = {
    neutrophil: new Image(), macrophage: new Image(), killerT: new Image(),
    adenovirus: new Image(), norovirus: new Image(), bacteriophage: new Image(),
    amoeba: new Image(), mini: new Image(), boss: new Image()
};

assets.neutrophil.src = '../assets/cell/cell_neutrophil.png';
assets.macrophage.src = '../assets/cell/cell_macrophage.png';
assets.killerT.src = '../assets/cell/cell_killer_t.png';
assets.adenovirus.src = '../assets/cell/virus_adeno.png';
assets.norovirus.src = '../assets/cell/virus_noro.png';
assets.bacteriophage.src = '../assets/cell/virus_phage.png';
assets.amoeba.src = '../assets/cell/microbe_amoeba.png';
assets.mini.src = '../assets/cell/microbe_amoeba.png';
assets.boss.src = '../assets/cell/virus_corona.png';

// === 虛擬搖桿 ===
const joystick = { startX: 0, startY: 0, curX: 0, curY: 0, active: false, maxRadius: 55, vx: 0, vy: 0 };

function resizeCanvas() {
    // window.innerWidth 在 iframe 中會精確抓取 iframe 的實際寬高
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    joystick.startX = canvas.width - 100;
    joystick.startY = canvas.height - 100;
    if(!joystick.active) { joystick.curX = joystick.startX; joystick.curY = joystick.startY; }
}
// 使用 ResizeObserver 監聽 body 尺寸，能完美捕捉外殼側邊欄收合所引起的 iframe 大小改變
const resizeObserver = new ResizeObserver(() => resizeCanvas());
resizeObserver.observe(document.body);

// === 玩家初始基礎數值 ===
const player = {
    x: 0, y: 0, radius: 18, speed: 3.4, color: '#00adb5', type: '',
    hp: 100, maxHp: 100, level: 1, xp: 0, xpNeeded: 100, lastShot: 0,
    bulletCount: 1, novaLevel: 0, laserLevel: 0, shieldLevel: 0, acidLevel: 0, freezeLevel: 0, magnetLevel: 0,
    lastNova: 0, magnetRange: 80
};
const camera = { x: 0, y: 0 };

// === 角色選擇系統 ===
function selectCharacter(type) {
    player.type = type;
    gameStarted = true;
    startTime = Date.now();
    
    if (type === 'neutrophil') {
        player.color = '#00adb5'; player.charName = '嗜中性球';
    } else if (type === 'macrophage') {
        player.color = '#ff9f43'; player.charName = '巨噬細胞';
        player.maxHp = 150; player.hp = 150; player.radius = 36; player.speed = 2.9; player.magnetRange = 130;
    } else if (type === 'killerT') {
        player.color = '#ff2e63'; player.charName = '殺手 T 細胞';
        player.speed = 4.1;
    }

    document.getElementById('charSelectScreen').style.display = 'none';
    canvas.style.display = 'block';
    document.getElementById('ui').style.display = 'flex';
    document.querySelectorAll('.bar-container').forEach(el => el.style.display = 'block');
    
    resizeCanvas();
    gameLoop();
}

// 搖桿共用邏輯
function joystickStart(clientX, clientY) {
    if (!gameStarted || isPaused) return;
    if (Math.hypot(clientX - joystick.startX, clientY - joystick.startY) < 100) joystick.active = true;
}
function joystickMove(clientX, clientY) {
    if (!joystick.active) return;
    const dx = clientX - joystick.startX, dy = clientY - joystick.startY;
    const dist = Math.hypot(dx, dy), angle = Math.atan2(dy, dx);
    if (dist > joystick.maxRadius) {
        joystick.curX = joystick.startX + Math.cos(angle) * joystick.maxRadius;
        joystick.curY = joystick.startY + Math.sin(angle) * joystick.maxRadius;
    } else { joystick.curX = clientX; joystick.curY = clientY; }
    const moveDist = Math.min(dist, joystick.maxRadius);
    joystick.vx = Math.cos(angle) * (moveDist / joystick.maxRadius);
    joystick.vy = Math.sin(angle) * (moveDist / joystick.maxRadius);
}
function joystickEnd() {
    joystick.active = false; joystick.curX = joystick.startX; joystick.curY = joystick.startY; joystick.vx = 0; joystick.vy = 0;
}

// 觸控監聽
window.addEventListener('touchstart', (e) => { 
    if (gameStarted && !isPaused) {
        joystickStart(e.touches[0].clientX, e.touches[0].clientY);
        // 主動阻止預設行為 (例如 iOS 的橡皮筋回彈與捲動)，確保 iframe 中的觸控操作不會被父層視窗攔截或中斷
        e.preventDefault();
    }
}, { passive: false });

window.addEventListener('touchmove', (e) => { 
    if (gameStarted && !isPaused) {
        e.preventDefault();
        if (joystick.active) {
            joystickMove(e.touches[0].clientX, e.touches[0].clientY); 
        }
    }
}, { passive: false });

window.addEventListener('touchend', (e) => { 
    if (gameStarted && !isPaused) {
        e.preventDefault();
        joystickEnd(); 
    }
}, { passive: false });

// 滑鼠監聽
window.addEventListener('mousedown', (e) => { joystickStart(e.clientX, e.clientY); });
window.addEventListener('mousemove', (e) => { joystickMove(e.clientX, e.clientY); });
window.addEventListener('mouseup', () => { joystickEnd(); });

// 點擊/觸碰遊戲畫面時，主動拉回鍵盤焦點，防止因外殼導航操作導致鍵盤卡死
const focusGame = () => window.focus();
window.addEventListener('mousedown', focusGame);
window.addEventListener('touchstart', focusGame);

// 鍵盤控制 (WASD / 方向鍵)
const keys = {};
window.addEventListener('keydown', (e) => {
    if (['w','a','s','d','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
        keys[e.key] = true;
        updateKeyboardJoystick();
    }
});
window.addEventListener('keyup', (e) => {
    if (['w','a','s','d','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
        keys[e.key] = false;
        updateKeyboardJoystick();
    }
});
function updateKeyboardJoystick() {
    if (!gameStarted || isPaused) return;
    let kx = 0, ky = 0;
    if (keys['a'] || keys['ArrowLeft'])  kx -= 1;
    if (keys['d'] || keys['ArrowRight']) kx += 1;
    if (keys['w'] || keys['ArrowUp'])    ky -= 1;
    if (keys['s'] || keys['ArrowDown'])  ky += 1;
    const len = Math.hypot(kx, ky);
    if (len > 0) {
        joystick.vx = kx / len;
        joystick.vy = ky / len;
        joystick.active = true;
        joystick.curX = joystick.startX + joystick.vx * joystick.maxRadius;
        joystick.curY = joystick.startY + joystick.vy * joystick.maxRadius;
    } else {
        joystickEnd();
    }
}

// === 病毒敵人生成邏輯 ===
let lastSpawn = 0;
function spawnLogic() {
    if (isPaused || Date.now() - lastSpawn < 1200) return;
    lastSpawn = Date.now();
    if (enemies.length > 65) return;

    const angle = Math.random() * Math.PI * 2;
    const dist = Math.max(canvas.width, canvas.height) / 2 + 60;
    const eX = player.x + Math.cos(angle) * dist;
    const eY = player.y + Math.sin(angle) * dist;

    // 腺病毒：半徑放大至 24
    let type = 'adenovirus', r = 24, s = 1.3, hp = 1, dmg = 10, col = '#00ff66';
    
    if (elapsedTime > 20 && Math.random() < 0.4) { 
        // 諾羅病毒：半徑放大至 22
        type = 'norovirus'; r = 22; s = 2.4; hp = 1; dmg = 15; col = '#ff3333'; 
    }
    if (elapsedTime > 55 && Math.random() < 0.3) { 
        // 噬菌體：半徑放大至 28
        type = 'bacteriophage'; r = 28; s = 0.9; hp = 3; dmg = 22; col = '#ff9f43'; 
    }
    if (elapsedTime > 90 && Math.random() < 0.2) { 
        type = 'amoeba'; r = 24; s = 0.6; hp = 7; dmg = 35; col = '#aa96da'; 
    }
    if (elapsedTime >= 120 && !enemies.some(e => e.type === 'boss')) { 
        type = 'boss'; r = 50; s = 1.1; hp = 80; dmg = 45; col = '#ffff00'; 
    }

    enemies.push({ x: eX, y: eY, radius: r, speed: s, color: col, hp, maxHp: hp, damage: dmg, type, lastShot: 0, freezeTime: 0 });
}

// === 各角色專屬初始武器發射邏輯 ===
function fireWeapon(closestEnemy, baseAngle) {
    if (player.type === 'neutrophil') {
        for (let i = 0; i < player.bulletCount; i++) {
            const a = baseAngle + (i - (player.bulletCount - 1) / 2) * 0.15;
            bullets.push({ x: player.x, y: player.y, vx: Math.cos(a) * 9, vy: Math.sin(a) * 9, radius: 5, dmg: 1, type: 'normal' });
        }
    } 
    else if (player.type === 'macrophage') {
        const count = 3 + player.bulletCount;
        for (let i = 0; i < count; i++) {
            const a = (Math.PI * 2 / count) * i;
            bullets.push({ x: player.x, y: player.y, vx: Math.cos(a) * 4.5, vy: Math.sin(a) * 4.5, radius: 9, dmg: 1.5, type: 'sweep' });
        }
    } 
    else if (player.type === 'killerT') {
        isLaserFiring = true; laserAngle = baseAngle; laserTimer = 0;
    }
}

// 突變選單系統
function showUpgradeMenu(isBossReward = false) {
    isPaused = true;
    document.getElementById('upgradeMenu').style.display = 'block';
    
    const titleEl = document.getElementById('upgradeTitle');
    if (isBossReward) {
        titleEl.innerHTML = `👑 擊敗冠狀病毒王！<br><span style="color:#ffff00; font-size:14px;">獲得核心抗體突變獎勵</span>`;
    } else {
        titleEl.innerText = `🧬 免疫基因突變`;
    }

    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';
    
    const skills = [
        { name: '⚔️ 細胞分裂 (武器效能+1)', act: () => player.bulletCount++ },
        { name: '🔥 細胞核爆 (360度大範圍清場)', act: () => player.novaLevel++ },
        { name: '🛡️ 細胞壁護盾 (旋轉防禦球)', act: () => player.shieldLevel++ },
        { name: '🧪 毒性化學路徑 (身後留下酸液)', act: () => player.acidLevel++ },
        { name: '❄️ cytokine 凍結波 (大範圍減速)', act: () => player.freezeLevel++ },
        { name: '🧲 趨化因子引力 (拾取範圍增加)', act: () => player.magnetLevel++ },
        { name: '🩹 細胞再生 (立刻恢復 40% 血量)', act: () => player.hp = Math.min(player.maxHp, player.hp + player.maxHp * 0.4) }
    ];

    skills.sort(() => 0.5 - Math.random()).slice(0, 3).forEach(s => {
        const b = document.createElement('button'); b.className = 'btn'; b.innerText = s.name;
        b.onclick = () => { s.act(); isPaused = false; document.getElementById('upgradeMenu').style.display = 'none'; };
        optionsDiv.appendChild(b);
    });
}

function update(dt) {
    if (isPaused) return;

    elapsedTime = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('gameTime').innerText = `${Math.floor(elapsedTime/60).toString().padStart(2,'0')}:${(elapsedTime%60).toString().padStart(2,'0')}`;

    player.x += joystick.vx * player.speed * dt; player.y += joystick.vy * player.speed * dt;
    camera.x = player.x - canvas.width / 2; camera.y = player.y - canvas.height / 2;

    document.getElementById('level').innerText = player.level;
    document.getElementById('charName').innerText = player.charName;
    document.getElementById('kills').innerText = kills;
    document.getElementById('xpBar').style.width = (player.xp / player.xpNeeded * 100) + '%';
    document.getElementById('hpBar').style.width = Math.max(0, (player.hp / player.maxHp * 100)) + '%';

    if (player.hp <= 0) gameOver();

    if (player.acidLevel > 0 && Date.now() - acidTimer > 350) {
        acids.push({ x: player.x, y: player.y, radius: 18 + player.acidLevel * 4, life: 2500 });
        acidTimer = Date.now();
    }
    for (let i = acids.length - 1; i >= 0; i--) { acids[i].life -= 16 * dt; if (acids[i].life <= 0) acids.splice(i, 1); }

    if (player.freezeLevel > 0) {
        freezeTimer += dt;
        if (freezeTimer > 150) {
            enemies.forEach(e => { if (Math.hypot(e.x - player.x, e.y - player.y) < 220 + player.freezeLevel * 20) e.freezeTime = 90; });
            freezeTimer = 0;
        }
    }

    let shotCooldown = player.type === 'killerT' ? 700 : 420;
    if (Date.now() - player.lastShot > shotCooldown && enemies.length > 0) {
        let closest = null, minDist = Infinity;
        enemies.forEach(e => { const d = Math.hypot(e.x - player.x, e.y - player.y); if (d < minDist) { minDist = d; closest = e; } });
        if (closest) {
            fireWeapon(closest, Math.atan2(closest.y - player.y, closest.x - player.x));
            player.lastShot = Date.now();
        }
    }

    if (player.novaLevel > 0 && Date.now() - player.lastNova > 4500) {
        const n = 10 + player.novaLevel * 2;
        for (let i = 0; i < n; i++) {
            const a = (Math.PI * 2 / n) * i;
            bullets.push({ x: player.x, y: player.y, vx: Math.cos(a) * 6, vy: Math.sin(a) * 6, radius: 6, dmg: 1.2, type: 'nova' });
        }
        player.lastNova = Date.now();
    }

    if (player.type === 'killerT' && isLaserFiring && laserTimer < 20) {
        laserTimer += dt;
        enemies.forEach((e, idx) => {
            const lx = Math.cos(laserAngle), ly = Math.sin(laserAngle);
            const dot = (e.x - player.x) * lx + (e.y - player.y) * ly;
            if (dot > 0) {
                const px = player.x + lx * dot, py = player.y + ly * dot;
                if (Math.hypot(e.x - px, e.y - py) < e.radius + 15) {
                    let d = 0.12;
                    if (e.hp / e.maxHp < 0.3) d *= 2;
                    e.hp -= d; if (e.hp <= 0) handleKill(e, idx);
                }
            }
        });
    } else if (laserTimer >= 20) { isLaserFiring = false; }

    spawnLogic();
    shieldAngle += 0.04 * dt;
    
    enemies.forEach((e, idx) => {
        const dist = Math.hypot(player.x - e.x, player.y - e.y);
        const angle = Math.atan2(player.y - e.y, player.x - e.x);

        if (e.freezeTime > 0) { e.freezeTime = Math.max(0, e.freezeTime - dt); } 
        else {
            if (e.type === 'ranged' && dist < 220) {
                if (Date.now() - e.lastShot > 2200) {
                    enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(angle) * 4.5, vy: Math.sin(angle) * 4.5, radius: 5, damage: e.damage });
                    e.lastShot = Date.now();
                }
            } else if (e.type === 'boss' && Date.now() - e.lastShot > 4000) {
                e.x += Math.cos(angle) * 35; e.y += Math.sin(angle) * 35;
                for(let i=0; i<6; i++) enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos((Math.PI*2/6)*i)*3, vy: Math.sin((Math.PI*2/6)*i)*3, radius: 5, damage: 15 });
                e.lastShot = Date.now();
            } else {
                e.x += Math.cos(angle) * e.speed * dt; e.y += Math.sin(angle) * e.speed * dt;
            }
        }

        acids.forEach(a => { if (Math.hypot(e.x - a.x, e.y - a.y) < e.radius + a.radius) { e.hp -= 0.025; if (e.hp <= 0) handleKill(e, idx); } });

        if (player.shieldLevel > 0) {
            for (let i = 0; i < player.shieldLevel; i++) {
                const sa = shieldAngle + (Math.PI * 2 / player.shieldLevel) * i;
                if (Math.hypot(e.x - (player.x + Math.cos(sa) * 60), e.y - (player.y + Math.sin(sa) * 60)) < e.radius + 8) {
                    e.hp -= 0.08; if (e.hp <= 0) handleKill(e, idx);
                }
            }
        }

        if (dist < player.radius + e.radius) { player.hp -= 0.5; }
    });

    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const eb = enemyBullets[i]; eb.x += eb.vx * dt; eb.y += eb.vy * dt;
        if (Math.hypot(player.x - eb.x, player.y - eb.y) > 900) { enemyBullets.splice(i, 1); continue; }
        if (Math.hypot(player.x - eb.x, player.y - eb.y) < player.radius + eb.radius) {
            player.hp -= eb.damage; enemyBullets.splice(i, 1);
        }
    }

    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i]; b.x += b.vx * dt; b.y += b.vy * dt;
        if (Math.hypot(player.x - b.x, player.y - b.y) > 900) { bullets.splice(i, 1); continue; }
        
        for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (Math.hypot(b.x - e.x, b.y - e.y) < e.radius + b.radius) {
                let finalDmg = b.dmg;
                if (player.type === 'killerT' && (e.hp / e.maxHp < 0.3)) finalDmg *= 2;
                e.hp -= finalDmg; bullets.splice(i, 1);
                if (e.hp <= 0) handleKill(e, j);
                break;
            }
        }
    }

    const actualMagnet = player.magnetRange + player.magnetLevel * 50;
    for (let i = xps.length - 1; i >= 0; i--) {
        const xp = xps[i]; const d = Math.hypot(player.x - xp.x, player.y - xp.y);
        if (d < actualMagnet) {
            const a = Math.atan2(player.y - xp.y, player.x - xp.x);
            xp.x += Math.cos(a) * 7.5 * dt; xp.y += Math.sin(a) * 7.5 * dt;
        }
        if (d < player.radius + xp.radius) {
            player.xp += xp.value; xps.splice(i, 1);
            if (player.xp >= player.xpNeeded) { player.xp -= player.xpNeeded; player.xpNeeded *= 1.35; player.level++; showUpgradeMenu(false); }
        }
    }
}

function handleKill(e, idx) {
    let xpValue = 35;
    if (player.type === 'neutrophil' && Math.random() < 0.15) xpValue *= 2;

    if (e.type === 'amoeba') {
        for (let i = 0; i < 3; i++) enemies.push({ x: e.x + (Math.random()-0.5)*20, y: e.y + (Math.random()-0.5)*20, radius: 11, speed: 1.6, color: '#bda5f5', hp: 1, maxHp: 1, damage: 8, type: 'mini', lastShot: 0, freezeTime: 0 });
    }
    xps.push({ x: e.x, y: e.y, radius: 4, color: e.type === 'boss' ? '#ffff00' : '#00ff66', value: xpValue });
    enemies.splice(idx, 1); kills++;

    if (e.type === 'boss') {
        showUpgradeMenu(true);
    }
}

function gameOver() {
    isPaused = true;
    const statsText = `你以 ${player.charName} 撐過了 ${elapsedTime} 秒，消滅了 ${kills} 個病毒。`;
    document.getElementById('gameOverStats').innerText = statsText;
    document.getElementById('gameOverScreen').style.display = 'block';
}

function restartGame() {
    location.reload();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 背景網格
    ctx.strokeStyle = '#141420'; ctx.lineWidth = 1;
    const ox = -camera.x % 60, oy = -camera.y % 60;
    for (let x = ox; x < canvas.width; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
    for (let y = oy; y < canvas.height; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

    acids.forEach(a => { ctx.beginPath(); ctx.arc(a.x - camera.x, a.y - camera.y, a.radius, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0, 255, 100, 0.15)'; ctx.fill(); });
    xps.forEach(xp => { ctx.beginPath(); ctx.arc(xp.x - camera.x, xp.y - camera.y, xp.radius, 0, Math.PI * 2); ctx.fillStyle = xp.color; ctx.fill(); });
    enemyBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x - camera.x, b.y - camera.y, b.radius, 0, Math.PI * 2); ctx.fillStyle = '#ff3333'; ctx.fill(); });

    if (player.type === 'killerT' && isLaserFiring) {
        ctx.save(); ctx.beginPath(); ctx.strokeStyle = 'rgba(255, 46, 99, 0.7)'; ctx.lineWidth = 15; ctx.lineCap = 'round';
        ctx.moveTo(player.x - camera.x, player.y - camera.y);
        ctx.lineTo((player.x + Math.cos(laserAngle) * 1200) - camera.x, (player.y + Math.sin(laserAngle) * 1200) - camera.y);
        ctx.stroke(); ctx.restore();
    }

    bullets.forEach(b => {
        ctx.beginPath(); ctx.arc(b.x - camera.x, b.y - camera.y, b.radius, 0, Math.PI * 2);
        ctx.fillStyle = b.type === 'sweep' ? '#ff9f43' : '#ffff00'; ctx.fill();
    });

    if (player.shieldLevel > 0) {
        for (let i = 0; i < player.shieldLevel; i++) {
            const sa = shieldAngle + (Math.PI * 2 / player.shieldLevel) * i;
            ctx.beginPath(); ctx.arc((player.x + Math.cos(sa) * 60) - camera.x, (player.y + Math.sin(sa) * 60) - camera.y, 8, 0, Math.PI * 2); ctx.fillStyle = '#00f5ff'; ctx.fill();
        }
    }

    // 繪製病毒敵人
    enemies.forEach(e => {
        const img = assets[e.type];
        if (img && img.complete && img.width > 0) {
            ctx.drawImage(img, e.x - camera.x - e.radius, e.y - camera.y - e.radius, e.radius * 2, e.radius * 2);
        } else {
            ctx.beginPath(); ctx.arc(e.x - camera.x, e.y - camera.y, e.radius, 0, Math.PI * 2); ctx.fillStyle = e.color; ctx.fill();
        }
        
        if (e.freezeTime > 0) { ctx.strokeStyle = '#00f5ff'; ctx.lineWidth = 3; ctx.stroke(); }
        
        if (e.hp < e.maxHp) {
            ctx.fillStyle = '#ff2e63'; ctx.fillRect(e.x - camera.x - 15, e.y - camera.y - e.radius - 8, 30, 4);
            ctx.fillStyle = '#00ff66'; ctx.fillRect(e.x - camera.x - 15, e.y - camera.y - e.radius - 8, 30 * (e.hp / e.maxHp), 4);
        }
    });

    // 繪製玩家免疫細胞
    const pImg = assets[player.type];
    if (pImg && pImg.complete && pImg.width > 0) {
        ctx.drawImage(pImg, player.x - camera.x - player.radius, player.y - camera.y - player.radius, player.radius * 2, player.radius * 2);
    } else {
        ctx.beginPath(); ctx.arc(player.x - camera.x, player.y - camera.y, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = player.color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5; ctx.stroke();
    }

    // 繪製右下角搖桿 (始終可見)
    // 外圈底座
    ctx.beginPath();
    ctx.arc(joystick.startX, joystick.startY, joystick.maxRadius, 0, Math.PI * 2);
    ctx.fillStyle = joystick.active ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.06)';
    ctx.fill();
    ctx.strokeStyle = joystick.active ? 'rgba(0, 173, 181, 0.6)' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 十字導引線
    ctx.strokeStyle = joystick.active ? 'rgba(0,173,181,0.25)' : 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(joystick.startX - joystick.maxRadius * 0.6, joystick.startY); ctx.lineTo(joystick.startX + joystick.maxRadius * 0.6, joystick.startY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(joystick.startX, joystick.startY - joystick.maxRadius * 0.6); ctx.lineTo(joystick.startX, joystick.startY + joystick.maxRadius * 0.6); ctx.stroke();

    // 搖桿圓鈕
    ctx.beginPath();
    ctx.arc(joystick.curX, joystick.curY, 20, 0, Math.PI * 2);
    ctx.fillStyle = joystick.active ? 'rgba(0, 173, 181, 0.6)' : 'rgba(0, 173, 181, 0.3)';
    ctx.fill();
    ctx.strokeStyle = joystick.active ? 'rgba(0, 230, 240, 0.8)' : 'rgba(0, 173, 181, 0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
}

let lastTime = 0;
function gameLoop(timestamp) {
    if (!timestamp) {
        requestAnimationFrame(gameLoop);
        return;
    }
    if (!lastTime) lastTime = timestamp;
    let dt = (timestamp - lastTime) / 16.666;
    if (dt > 4) dt = 4; // Prevent massive jumps on tab switches
    lastTime = timestamp;

    update(dt);
    draw();
    requestAnimationFrame(gameLoop);
}
</script>
