<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>節奏刺客：一閃</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            overflow: hidden; /* 防止手機滑動 */
        }
        
        /* 起始選擇畫面 */
        #startScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100; /* 蓋在最上層 */
        }
        .device-btn {
            background-color: #00d2ff;
            color: #111;
            border: none;
            padding: 15px 40px;
            margin: 10px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .device-btn:hover {
            background-color: #00a0cc;
        }

        /* 遊戲介面 */
        canvas {
            background-color: #111;
            border: 2px solid #555;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            max-width: 100%;
        }
        #ui {
            position: absolute;
            top: 10px;
            text-align: center;
            z-index: 10;
        }

        /* 手機/平板的虛擬觸控按鈕 */
        #touchControls {
            display: none; /* 預設隱藏 */
            position: absolute;
            bottom: 30px;
            width: 100%;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 20;
        }
        .touch-btn {
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 24px;
            font-weight: bold;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            user-select: none;
        }
        .touch-btn:active {
            background-color: rgba(0, 210, 255, 0.5);
        }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1>節奏刺客：一閃</h1>
        <p>請選擇您的遊玩裝置：</p>
        <button class="device-btn" onclick="startGame('mobile')">📱 手機</button>
        <button class="device-btn" onclick="startGame('tablet')">💊 平板</button>
        <button class="device-btn" onclick="startGame('desktop')">💻 電腦</button>
    </div>

    <div id="ui">
        <h1 id="scoreBoard">分數: 0</h1>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="touchControls">
        <button class="touch-btn" id="btnLeft">左斬</button>
        <button class="touch-btn" id="btnRight">右斬</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('scoreBoard');
    const startScreen = document.getElementById('startScreen');
    const touchControls = document.getElementById('touchControls');

    // 遊戲核心變數
    let score = 0;
    let enemies = [];
    const player = { x: 400, y: 200, size: 40, color: '#00d2ff' };
    
    // 定義打擊區
    const hitZoneLeft = { x: 280, width: 60 };
    const hitZoneRight = { x: 460, width: 60 };
    const enemySpeed = 4;
    const enemySize = 30;
    let gameInterval;
    let animationId;

    // 隨機生成敵人
    function spawnEnemy() {
        const isLeft = Math.random() < 0.5;
        const enemy = {
            x: isLeft ? 0 : canvas.width,
            y: 200 - enemySize / 2,
            direction: isLeft ? 1 : -1,
            side: isLeft ? 'left' : 'right'
        };
        enemies.push(enemy);
    }

    // 處理玩家攻擊邏輯
    function triggerAttack(side) {
        let hit = checkHit(side);
        if (hit) {
            score += 10;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height); // 一刀閃光特效
        } else {
            score -= 5; // 空揮扣分
        }
        scoreBoard.innerText = `分數: ${score}`;
    }

    // 檢查判定
    function checkHit(side) {
        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i];
            if (e.side === side) {
                let inZone = false;
                if (side === 'left' && e.x + enemySize > hitZoneLeft.x && e.x < hitZoneLeft.x + hitZoneLeft.width) {
                    inZone = true;
                } else if (side === 'right' && e.x < hitZoneRight.x + hitZoneRight.width && e.x + enemySize > hitZoneRight.x) {
                    inZone = true;
                }
                if (inZone) {
                    enemies.splice(i, 1); 
                    return true;
                }
            }
        }
        return false;
    }

    // 鍵盤監聽事件 (電腦版)
    window.addEventListener('keydown', (e) => {
        if (startScreen.style.display === 'none') {
            if (e.key === 'ArrowLeft') triggerAttack('left');
            if (e.key === 'ArrowRight') triggerAttack('right');
        }
    });

    // 觸控/滑鼠監聽事件 (手機/平板版)
    document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); triggerAttack('left'); });
    document.getElementById('btnLeft').addEventListener('mousedown', (e) => { e.preventDefault(); triggerAttack('left'); });
    
    document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); triggerAttack('right'); });
    document.getElementById('btnRight').addEventListener('mousedown', (e) => { e.preventDefault(); triggerAttack('right'); });

    // 遊戲主迴圈
    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 畫出打擊區
        ctx.fillStyle = 'rgba(0, 255, 0, 0.2)';
        ctx.fillRect(hitZoneLeft.x, player.y - 30, hitZoneLeft.width, 60);
        ctx.fillRect(hitZoneRight.x, player.y - 30, hitZoneRight.width, 60);

        // 畫出玩家
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x - player.size / 2, player.y - player.size / 2, player.size, player.size);

        // 更新與畫出敵人
        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i];
            e.x += e.direction * enemySpeed;
            
            ctx.fillStyle = '#ff003c';
            ctx.fillRect(e.x, e.y, enemySize, enemySize);

            // 敵人碰到玩家 (Miss)
            if ((e.side === 'left' && e.x > player.x) || (e.side === 'right' && e.x < player.x)) {
                enemies.splice(i, 1);
                score -= 10;
                scoreBoard.innerText = `分數: ${score}`;
                i--;
            }
        }
        animationId = requestAnimationFrame(gameLoop);
    }

    // 啟動遊戲的函數 (由按鈕觸發)
    function startGame(deviceType) {
        // 隱藏起始畫面
        startScreen.style.display = 'none';

        // 如果是手機或平板，顯示虛擬觸控按鈕
        if (deviceType === 'mobile' || deviceType === 'tablet') {
            touchControls.style.display = 'flex';
        }

        // 重置變數並開始遊戲
        score = 0;
        enemies = [];
        scoreBoard.innerText = `分數: ${score}`;
        
        // 確保不會重複啟動計時器
        clearInterval(gameInterval);
        cancelAnimationFrame(animationId);
        
        gameInterval = setInterval(spawnEnemy, 1500); // 啟動敵人生成
        gameLoop(); // 啟動繪圖迴圈
    }
</script>
</body>
</html>
