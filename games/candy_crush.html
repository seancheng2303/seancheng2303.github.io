<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Candy Crush (8-bit 音樂音效版)</title>
    <style>
        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overscroll-behavior: none; color: white;
        }

        .game-container { display: flex; flex-direction: column; align-items: center; }

        .header-panel {
            display: flex; justify-content: space-between; align-items: center;
            width: 400px; margin-bottom: 15px;
        }

        .score-board { font-size: 24px; font-weight: bold; color: #f1c40f; }

        .music-btn {
            background-color: #34495e; color: white; border: 2px solid #f1c40f;
            border-radius: 8px; padding: 6px 12px; font-size: 14px;
            cursor: pointer; font-weight: bold; transition: all 0.2s;
        }
        .music-btn:active { transform: scale(0.95); }
        .music-on { background-color: #f1c40f; color: #2c3e50; }

        .grid {
            display: flex; flex-wrap: wrap;
            width: 400px; height: 400px;
            background-color: rgba(0, 0, 0, 0.3);
            border: 4px solid #34495e; border-radius: 10px;
            padding: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .grid div {
            width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; box-sizing: border-box;
            border: 2px solid transparent; transition: transform 0.1s;
            touch-action: none; user-select: none; -webkit-user-select: none;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px;
        }

        .grid div:hover { transform: scale(1.1); border-color: rgba(255,255,255,0.3); }

        .type-striped::after { content: "🚀"; }
        .type-wrapped::after { content: "💣"; }
        .type-color_bomb { background-color: #333 !important; }
        .type-color_bomb::after { content: "🌈"; }

        @media (max-width: 450px) {
            .header-panel { width: 320px; }
            .grid { width: 320px; height: 320px; }
            .grid div { width: 40px; height: 40px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <div class="game-container">
        <div class="header-panel">
            <div class="score-board">分數: <span id="score">0</span></div>
            <button id="music-toggle" class="music-btn">🎵 音樂: 關</button>
        </div>
        <div class="grid" id="game-grid"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.querySelector('.grid');
            const scoreDisplay = document.getElementById('score');
            const width = 8;
            const squares = [];
            let score = 0;
            const candyColors = ['#e74c3c', '#f1c40f', '#e67e22', '#9b59b6', '#2ecc71', '#3498db'];

            // === 🎵 音樂與 Web Audio API 8-bit 音效系統 ===
            const bgMusic = document.getElementById('bg-music');
            const musicBtn = document.getElementById('music-toggle');
            let isMusicPlaying = false;

            // 初始化 Web Audio API 引擎 (用來合成 8-bit 音效)
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();

            musicBtn.addEventListener('click', () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                if (isMusicPlaying) {
                    bgMusic.pause();
                    musicBtn.textContent = '🎵 音樂: 關';
                    musicBtn.classList.remove('music-on');
                } else {
                    bgMusic.play().catch(e => console.log("等待音樂載入或檔案不存在"));
                    musicBtn.textContent = '🎵 音樂: 開';
                    musicBtn.classList.add('music-on');
                }
                isMusicPlaying = !isMusicPlaying;
            });

            // 產生 8-bit 方波音效 (Square Wave)
            function play8BitSound() {
                if (!isMusicPlaying || audioCtx.state === 'suspended') return;
                
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'square'; // 方波是 8-bit 聲音的靈魂
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                const now = audioCtx.currentTime;
                // 快速的「叮」聲 (頻率從 600Hz 降到 400Hz)
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                
                // 音量控制 (避免太大聲)
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                
                osc.start(now);
                osc.stop(now + 0.1);
            }

            // ================= 遊戲核心邏輯 =================

            function createBoard() {
                for (let i = 0; i < width * width; i++) {
                    const square = document.createElement('div');
                    square.setAttribute('draggable', true);
                    square.setAttribute('id', i);
                    square.dataset.type = 'normal';
                    let randomColor = Math.floor(Math.random() * candyColors.length);
                    square.style.backgroundColor = candyColors[randomColor];
                    grid.appendChild(square);
                    squares.push(square);
                }
            }
            createBoard();

            let squareIdBeingDragged, squareIdBeingReplaced;
            let lastActionTarget = null; 

            squares.forEach(square => {
                square.addEventListener('dragstart', dragStart);
                square.addEventListener('dragend', dragEnd);
                square.addEventListener('dragover', e => e.preventDefault());
                square.addEventListener('dragenter', e => e.preventDefault());
                square.addEventListener('drop', dragDrop);
                square.addEventListener('touchstart', handleTouchStart, {passive: false});
                square.addEventListener('touchend', handleTouchEnd);
            });

            let touchStartX = 0, touchStartY = 0;
            function dragStart() { squareIdBeingDragged = parseInt(this.id); }
            function dragDrop() { squareIdBeingReplaced = parseInt(this.id); }
            function dragEnd() { validateMove(); }

            function handleTouchStart(e) {
                touchStartX = e.changedTouches[0].clientX;
                touchStartY = e.changedTouches[0].clientY;
                squareIdBeingDragged = parseInt(this.id);
            }

            function handleTouchEnd(e) {
                if (squareIdBeingDragged === null) return;
                let diffX = e.changedTouches[0].clientX - touchStartX;
                let diffY = e.changedTouches[0].clientY - touchStartY;

                if (Math.abs(diffX) < 20 && Math.abs(diffY) < 20) return;

                if (Math.abs(diffX) > Math.abs(diffY)) {
                    squareIdBeingReplaced = diffX > 0 ? squareIdBeingDragged + 1 : squareIdBeingDragged - 1; 
                } else {
                    squareIdBeingReplaced = diffY > 0 ? squareIdBeingDragged + width : squareIdBeingDragged - width; 
                }

                if ((squareIdBeingDragged % width === width - 1 && squareIdBeingReplaced === squareIdBeingDragged + 1) ||
                    (squareIdBeingDragged % width === 0 && squareIdBeingReplaced === squareIdBeingDragged - 1) ||
                    squareIdBeingReplaced < 0 || squareIdBeingReplaced >= width * width) return;

                validateMove();
            }

            function swapSquares(id1, id2) {
                let tempColor = squares[id1].style.backgroundColor;
                let tempType = squares[id1].dataset.type;
                let tempClass = squares[id1].className;

                squares[id1].style.backgroundColor = squares[id2].style.backgroundColor;
                squares[id1].dataset.type = squares[id2].dataset.type;
                squares[id1].className = squares[id2].className;

                squares[id2].style.backgroundColor = tempColor;
                squares[id2].dataset.type = tempType;
                squares[id2].className = tempClass;
            }

            function validateMove() {
                let validMoves = [squareIdBeingDragged - 1, squareIdBeingDragged - width, squareIdBeingDragged + 1, squareIdBeingDragged + width];
                if (!validMoves.includes(squareIdBeingReplaced)) return;

                let draggedSq = squares[squareIdBeingDragged];
                let replacedSq = squares[squareIdBeingReplaced];

                swapSquares(squareIdBeingDragged, squareIdBeingReplaced);
                lastActionTarget = squareIdBeingReplaced; 

                if (draggedSq.dataset.type === 'color_bomb' || replacedSq.dataset.type === 'color_bomb') {
                    handleColorBombInteraction(squareIdBeingDragged, squareIdBeingReplaced);
                    squareIdBeingDragged = null; squareIdBeingReplaced = null;
                    return;
                }

                if (!checkMatches()) {
                    swapSquares(squareIdBeingDragged, squareIdBeingReplaced);
                }
                
                squareIdBeingDragged = null; squareIdBeingReplaced = null;
            }

            function handleColorBombInteraction(id1, id2) {
                let bombId = squares[id1].dataset.type === 'color_bomb' ? id1 : id2;
                let targetId = bombId === id1 ? id2 : id1;
                let targetColor = squares[targetId].style.backgroundColor;
                let targetType = squares[targetId].dataset.type;

                clearSquare(bombId);

                if (targetType === 'normal') {
                    squares.forEach((sq, i) => {
                        if (sq.style.backgroundColor === targetColor && sq.dataset.type === 'normal') clearSquare(i);
                    });
                } else if (targetType !== 'color_bomb') {
                    squares.forEach((sq, i) => {
                        if (sq.style.backgroundColor === targetColor) {
                            sq.dataset.type = targetType;
                            sq.className = `type-${targetType}`;
                            clearSquare(i); 
                        }
                    });
                }
            }

            function clearSquare(index) {
                let sq = squares[index];
                if (sq.style.backgroundColor === '') return; 

                let type = sq.dataset.type;
                sq.style.backgroundColor = '';
                sq.dataset.type = 'normal';
                sq.className = '';
                score += 5;
                scoreDisplay.innerHTML = score;
                
                // 觸發消除音效
                play8BitSound();

                let row = Math.floor(index / width);
                let col = index % width;

                if (type === 'striped') {
                    for (let i = 0; i < width; i++) {
                        if (squares[row * width + i].style.backgroundColor !== '') clearSquare(row * width + i);
                        if (squares[i * width + col].style.backgroundColor !== '') clearSquare(i * width + col);
                    }
                } else if (type === 'wrapped') {
                    for (let r = row - 1; r <= row + 2; r++) {
                        for (let c = col - 1; c <= col + 2; c++) {
                            if (r >= 0 && r < width && c >= 0 && c < width) {
                                let targetId = r * width + c;
                                if (squares[targetId].style.backgroundColor !== '') clearSquare(targetId);
                            }
                        }
                    }
                }
            }

            function checkMatches() {
                let matchedGroups = [];
                let hasMatch = false;

                for (let r = 0; r < width; r++) {
                    let matchLength = 1;
                    for (let c = 0; c < width; c++) {
                        let i = r * width + c;
                        let color = squares[i].style.backgroundColor;
                        if (c < width - 1 && color !== '' && color === squares[i+1].style.backgroundColor) {
                            matchLength++;
                        } else {
                            if (matchLength >= 3) {
                                let group = [];
                                for (let k = 0; k < matchLength; k++) group.push(i - k);
                                matchedGroups.push({ indices: group, color: color, type: 'horizontal' });
                                hasMatch = true;
                            }
                            matchLength = 1;
                        }
                    }
                }

                for (let c = 0; c < width; c++) {
                    let matchLength = 1;
                    for (let r = 0; r < width; r++) {
                        let i = r * width + c;
                        let color = squares[i].style.backgroundColor;
                        if (r < width - 1 && color !== '' && color === squares[i+width].style.backgroundColor) {
                            matchLength++;
                        } else {
                            if (matchLength >= 3) {
                                let group = [];
                                for (let k = 0; k < matchLength; k++) group.push(i - k * width);
                                matchedGroups.push({ indices: group, color: color, type: 'vertical' });
                                hasMatch = true;
                            }
                            matchLength = 1;
                        }
                    }
                }

                if (!hasMatch) return false;

                let toClear = new Set();
                let spawnList = [];

                matchedGroups.forEach(group => {
                    let len = group.indices.length;
                    let intersection = null;
                    matchedGroups.forEach(otherGroup => {
                        if (group !== otherGroup && group.color === otherGroup.color) {
                            let shared = group.indices.filter(idx => otherGroup.indices.includes(idx));
                            if (shared.length > 0) intersection = shared[0];
                        }
                    });

                    let spawnIndex = group.indices.includes(lastActionTarget) ? lastActionTarget : group.indices[1];

                    if (len >= 5) {
                        spawnList.push({ index: spawnIndex, type: 'color_bomb', color: group.color });
                    } else if (intersection !== null) {
                        spawnList.push({ index: intersection, type: 'wrapped', color: group.color });
                    } else if (len === 4) {
                        spawnList.push({ index: spawnIndex, type: 'striped', color: group.color });
                    }

                    group.indices.forEach(idx => toClear.add(idx));
                });

                toClear.forEach(idx => clearSquare(idx));

                spawnList.forEach(spawn => {
                    if (squares[spawn.index].dataset.type === 'normal') {
                        squares[spawn.index].dataset.type = spawn.type;
                        squares[spawn.index].className = `type-${spawn.type}`;
                        if (spawn.type !== 'color_bomb') squares[spawn.index].style.backgroundColor = spawn.color;
                        else squares[spawn.index].style.backgroundColor = 'transparent';
                    }
                });

                lastActionTarget = null;
                return true;
            }

            function moveDown() {
                for (let i = 0; i < 56; i++) {
                    if (squares[i + width].style.backgroundColor === '') {
                        squares[i + width].style.backgroundColor = squares[i].style.backgroundColor;
                        squares[i + width].dataset.type = squares[i].dataset.type;
                        squares[i + width].className = squares[i].className;
                        
                        squares[i].style.backgroundColor = '';
                        squares[i].dataset.type = 'normal';
                        squares[i].className = '';
                    }
                    if (i < 8 && squares[i].style.backgroundColor === '') {
                        squares[i].style.backgroundColor = candyColors[Math.floor(Math.random() * candyColors.length)];
                        squares[i].dataset.type = 'normal';
                        squares[i].className = '';
                    }
                }
            }

            window.setInterval(function() {
                checkMatches();
                moveDown();
            }, 150);
        });
    </script>
</body>
</html>
